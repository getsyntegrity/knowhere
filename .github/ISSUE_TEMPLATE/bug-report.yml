name: Bug report
description: Report a reproducible problem in the Knowhere API or worker.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping us improve Knowhere. Please include enough detail for maintainers to reproduce the issue safely.
  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      description: Which API surface or runtime component is affected?
      multiple: true
      options:
        - REST API
        - Worker
        - Authentication
        - Billing or credits
        - Document parsing
        - Retrieval
        - Self-hosted deployment
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the smallest set of requests, uploads, jobs, or commands that reproduce the issue.
      placeholder: |
        1. Start the API with ...
        2. Send POST /...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: Relevant request or job details
      description: Provide the request_id and/or job_id from the response.
      render: text
