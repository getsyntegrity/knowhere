name: CI/CD Pipeline - Production & Staging

on:
  push:
    branches: [main, staging]
    tags:
      - 'v*'
  pull_request:
    branches: [main, staging]
  workflow_dispatch:
    inputs:
      target_environment:
        description: '强制部署到指定环境'
        required: true
        type: choice
        options:
          - staging
          - prod
      service:
        description: '服务选择（空=全部）'
        required: false
        type: choice
        options:
          - all
          - api
          - web
          - worker
      simulate_only:
        description: '仅模拟流程，不实际部署'
        required: false
        type: boolean
        default: false

env:
  # 容器注册表配置
  REGISTRY: ghcr.io
  ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}
  # AWS ECR配置
  ECR_REGISTRY: 107424103509.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: knowhere
  
  # 集群配置（仅生产环境）
  ALIYUN_ACK_PROD_CLUSTER_ID: ${{ secrets.ALIYUN_ACK_PROD_CLUSTER_ID }}
  AWS_EKS_PROD_CLUSTER_NAME: ${{ secrets.AWS_EKS_PROD_CLUSTER_NAME }}
  AWS_EKS_PROD_REGION: ${{ secrets.AWS_EKS_PROD_REGION }}
  ALIYUN_ECS_STAGING_INSTANCE_ID: ${{ secrets.ALIYUN_ECS_STAGING_INSTANCE_ID }}

jobs:
  # Job 1: 构建和推送镜像
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        # AWS环境不需要web，但构建阶段仍然构建所有服务（包括web）
        # 因为阿里云环境需要web服务
        service: [api, web, worker]
        include:
          - service: api
            dockerfile: deploy/docker/Dockerfile.api
            image_name: knowhere-backend
            ecr_repo_name: knowhere-backend  # ECR仓库名称
          - service: web
            dockerfile: deploy/docker/Dockerfile.web
            image_name: knowhere-frontend
            ecr_repo_name: knowhere-frontend  # ECR仓库名称（AWS不需要但保留）
          - service: worker
            dockerfile: deploy/docker/Dockerfile.worker
            image_name: knowhere-worker
            ecr_repo_name: knowhere-worker  # ECR仓库名称
    
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.tags.outputs.image_tag }}
      is_pr: ${{ steps.check-event.outputs.is_pr }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Check event type
        id: check-event
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "is_pr=true" >> $GITHUB_OUTPUT
            echo "PR event detected"
          else
            echo "is_pr=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Determine target environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.target_environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            # PR事件时，根据目标分支确定环境
            PR_TARGET_BRANCH="${{ github.base_ref }}"
            if [ "$PR_TARGET_BRANCH" == "main" ]; then
              echo "environment=prod" >> $GITHUB_OUTPUT
            elif [ "$PR_TARGET_BRANCH" == "staging" ]; then
              echo "environment=staging" >> $GITHUB_OUTPUT
            else
              # 默认使用staging环境进行PR构建
              echo "environment=staging" >> $GITHUB_OUTPUT
            fi
          else
            # 其他情况推送到staging环境
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
          echo "Environment determined: ${{ steps.env.outputs.environment }}"

      
      - name: Generate image tag
        id: tags
        run: |
          ENVIRONMENT="${{ steps.env.outputs.environment }}"
          SHORT_SHA=${GITHUB_SHA:0:8}
          IS_PR="${{ steps.check-event.outputs.is_pr }}"
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            GIT_TAG=$(echo "${{ github.ref }}" | sed 's|refs/tags/||')
            IMAGE_TAG="${GIT_TAG}-${ENVIRONMENT}"
          elif [ "$IS_PR" == "true" ]; then
            # PR构建使用特定的标签格式，包含PR编号
            PR_NUMBER="${{ github.event.pull_request.number }}"
            IMAGE_TAG="pr-${PR_NUMBER}-${SHORT_SHA}"
          else
            IMAGE_TAG="${ENVIRONMENT}-${SHORT_SHA}"
          fi
          
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "latest_tag=${ENVIRONMENT}-latest" >> $GITHUB_OUTPUT
          echo "Generated tag: $IMAGE_TAG"
      
      - name: Generate image URIs for current service
        id: image-uris
        run: |
          ENVIRONMENT="${{ steps.env.outputs.environment }}"
          IMAGE_TAG="${{ steps.tags.outputs.image_tag }}"
          LATEST_TAG="${{ steps.tags.outputs.latest_tag }}"
          IS_PR="${{ steps.check-event.outputs.is_pr }}"
          
          # 获取当前服务的配置
          SERVICE="${{ matrix.service }}"
          IMAGE_NAME_LOWERCASE=$(echo "${{ matrix.image_name }}" | tr '[:upper:]' '[:lower:]')
          ECR_REPO_NAME="${{ matrix.ecr_repo_name }}"
          
          # 将所有者名称转换为小写
          OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          # GHCR镜像URI（强制小写）
          GHCR_URI="${{ env.REGISTRY }}/$OWNER_LOWERCASE/$IMAGE_NAME_LOWERCASE"
          echo "ghcr_image_uri=$GHCR_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT
          
          # PR时只推送到GHCR，不推送到ACR和ECR的latest标签
          if [ "$IS_PR" == "false" ]; then
            echo "ghcr_latest_uri=$GHCR_URI:$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            echo "ghcr_latest_uri=" >> $GITHUB_OUTPUT
          fi
          
          # ACR镜像URI（如果配置了ACR）
          if [ -n "${{ env.ACR_REGISTRY }}" ] && [ "$IS_PR" == "false" ]; then
            # PR时跳过ACR推送
            ACR_NAMESPACE_LOWERCASE=$(echo "${{ env.ACR_NAMESPACE }}" | tr '[:upper:]' '[:lower:]')
            ACR_URI="${{ env.ACR_REGISTRY }}/$ACR_NAMESPACE_LOWERCASE/$IMAGE_NAME_LOWERCASE"
            echo "acr_image_uri=$ACR_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT
            echo "acr_latest_uri=$ACR_URI:$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            echo "acr_image_uri=" >> $GITHUB_OUTPUT
            echo "acr_latest_uri=" >> $GITHUB_OUTPUT
          fi
          
          # ECR镜像URI（AWS不需要web服务的ECR镜像）
          if [ "$SERVICE" != "web" ] && [ "$IS_PR" == "false" ]; then
            # API和worker服务推送到ECR，但PR时不推送
            ECR_URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}/$ECR_REPO_NAME"
            echo "ecr_image_uri=$ECR_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT
            echo "ecr_latest_uri=$ECR_URI:$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            # Web服务不推送到ECR，或者PR时跳过ECR推送
            echo "ecr_image_uri=" >> $GITHUB_OUTPUT
            echo "ecr_latest_uri=" >> $GITHUB_OUTPUT
          fi
          
          # 为当前服务保存镜像URI到文件，供后续步骤使用
          echo "GHCR_URI=$GHCR_URI:$IMAGE_TAG" >> $GITHUB_ENV
          if [ -n "${{ env.ACR_REGISTRY }}" ] && [ "$IS_PR" == "false" ]; then
            echo "ACR_URI=$ACR_URI:$IMAGE_TAG" >> $GITHUB_ENV
          fi
          if [ "$SERVICE" != "web" ] && [ "$IS_PR" == "false" ]; then
            echo "ECR_URI=$ECR_URI:$IMAGE_TAG" >> $GITHUB_ENV
          fi
      
      - name: Save image URIs to outputs for each service
        id: save-uris
        run: |
          SERVICE="${{ matrix.service }}"
          ENV_FILE="/tmp/${SERVICE}_image_uris.env"
          
          # 创建包含镜像URI的文件
          cat > $ENV_FILE << EOF
          ${SERVICE}_ghcr_image_uri=${{ steps.image-uris.outputs.ghcr_image_uri }}
          ${SERVICE}_acr_image_uri=${{ steps.image-uris.outputs.acr_image_uri }}
          ${SERVICE}_ecr_image_uri=${{ steps.image-uris.outputs.ecr_image_uri }}
          EOF
          
          # 上传为文件，供后续作业使用
          echo "ENV_FILE=$ENV_FILE" >> $GITHUB_ENV
      
      - name: Upload image URIs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-image-uris
          path: ${{ env.ENV_FILE }}
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Login to Alibaba Cloud Container Registry
        if: env.ACR_REGISTRY != '' && steps.check-event.outputs.is_pr == 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}
      
      - name: Configure AWS credentials for ECR
        if: steps.check-event.outputs.is_pr == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1  # ECR所在区域
      
      - name: Login to AWS ECR
        if: steps.check-event.outputs.is_pr == 'false'
        id: login-ecr
        run: |
          # 使用aws cli登录ECR
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
          echo "✅ Logged in to AWS ECR"
      
      - name: Build and push to registries
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.image-uris.outputs.ghcr_image_uri }}
            ${{ steps.image-uris.outputs.ghcr_latest_uri }}
            ${{ steps.image-uris.outputs.acr_image_uri }}
            ${{ steps.image-uris.outputs.acr_latest_uri }}
            ${{ steps.image-uris.outputs.ecr_image_uri }}
            ${{ steps.image-uris.outputs.ecr_latest_uri }}
          build-args: |
            ENVIRONMENT=${{ steps.env.outputs.environment }}
            APP_VERSION=${{ steps.tags.outputs.image_tag }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 过滤掉空的tag（对于PR事件，ACR和ECR的tag可能为空）
          labels: |
            org.opencontainers.image.title=${{ matrix.image_name }}
            org.opencontainers.image.description=${{ matrix.service }} service for Knowhere application
            org.opencontainers.image.version=${{ steps.tags.outputs.image_tag }}
            org.opencontainers.image.created=${{ steps.build-time.outputs.time }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
      
      - name: Record build summary
        run: |
          echo "=== Build Summary ==="
          echo "Service: ${{ matrix.service }}"
          echo "Environment: ${{ steps.env.outputs.environment }}"
          echo "Image Tag: ${{ steps.tags.outputs.image_tag }}"
          echo "Event Type: ${{ github.event_name }}"
          echo "Is PR: ${{ steps.check-event.outputs.is_pr }}"
          echo "GHCR Image: ${{ steps.image-uris.outputs.ghcr_image_uri }}"
          if [ -n "${{ steps.image-uris.outputs.acr_image_uri }}" ]; then
            echo "ACR Image: ${{ steps.image-uris.outputs.acr_image_uri }}"
          else
            echo "ACR Image: (not pushed for PR event)"
          fi
          if [ -n "${{ steps.image-uris.outputs.ecr_image_uri }}" ]; then
            echo "ECR Image: ${{ steps.image-uris.outputs.ecr_image_uri }}"
          else
            echo "ECR Image: (not pushed for web service or PR event)"
          fi

# Job 2: 环境部署
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      github.event.inputs.simulate_only != 'true' &&
      (github.event_name != 'pull_request' || github.event.inputs.target_environment != '')
    
    strategy:
      # 部署矩阵：阿里云环境需要部署所有服务，AWS环境只部署api和worker
      # 具体逻辑在后续步骤中判断
      matrix:
        service: [api, web, worker]  # 构建了所有服务，部署时根据平台过滤
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Check if should deploy this service
        id: check-deploy
        run: |
          INPUT_SERVICE="${{ github.event.inputs.service }}"
          CURRENT_SERVICE="${{ matrix.service }}"
          IS_PR="${{ needs.build-and-push.outputs.is_pr }}"
          
          # 如果是PR事件，默认不自动部署，除非手动触发指定了环境
          if [ "$IS_PR" == "true" ] && [ -z "${{ github.event.inputs.target_environment }}" ]; then
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "⏭️  PR事件不自动部署，跳过服务: $CURRENT_SERVICE"
            exit 0
          fi
          
          if [[ -z "$INPUT_SERVICE" || "$INPUT_SERVICE" == "all" || "$INPUT_SERVICE" == "$CURRENT_SERVICE" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ Will deploy service: $CURRENT_SERVICE"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "⏭️  Skipping service: $CURRENT_SERVICE (manual input specified: $INPUT_SERVICE)"
          fi
  
      - name: Download image URIs artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.service }}-image-uris
          path: /tmp/image-uris
  
      - name: Load image URIs from file
        id: load-uris
        run: |
          ENV_FILE="/tmp/image-uris/${{ matrix.service }}_image_uris.env"
          if [ -f "$ENV_FILE" ]; then
            # 读取环境变量文件
            source $ENV_FILE
            
            # 输出到GitHub Actions环境
            echo "GHCR_IMAGE_URI=${${{ matrix.service }}_ghcr_image_uri}" >> $GITHUB_ENV
            echo "ACR_IMAGE_URI=${${{ matrix.service }}_acr_image_uri}" >> $GITHUB_ENV
            echo "ECR_IMAGE_URI=${${{ matrix.service }}_ecr_image_uri}" >> $GITHUB_ENV
            
            # 同时输出到步骤输出
            echo "ghcr_uri=${${{ matrix.service }}_ghcr_image_uri}" >> $GITHUB_OUTPUT
            echo "acr_uri=${${{ matrix.service }}_acr_image_uri}" >> $GITHUB_OUTPUT
            echo "ecr_uri=${${{ matrix.service }}_ecr_image_uri}" >> $GITHUB_OUTPUT
            
            echo "✅ Loaded image URIs for ${{ matrix.service }}"
            echo "GHCR: ${${{ matrix.service }}_ghcr_image_uri}"
            echo "ACR: ${${{ matrix.service }}_acr_image_uri}"
            echo "ECR: ${${{ matrix.service }}_ecr_image_uri}"
          else
            echo "❌ Error: Image URIs file not found: $ENV_FILE"
            exit 1
          fi
  
      - name: Determine deployment type and namespace
        id: deploy-type
        run: |
          ENVIRONMENT="${{ needs.build-and-push.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          IS_PR="${{ needs.build-and-push.outputs.is_pr }}"
          
          # 如果是PR事件且手动指定了环境，使用指定环境
          if [ "$IS_PR" == "true" ] && [ -n "${{ github.event.inputs.target_environment }}" ]; then
            ENVIRONMENT="${{ github.event.inputs.target_environment }}"
            echo "PR事件使用手动指定环境: $ENVIRONMENT"
          fi
          
          # 确定部署类型（基于环境和平台策略）
          if [ "$ENVIRONMENT" == "prod" ]; then
            DEPLOY_TYPE="k8s"
            echo "Deploying PRODUCTION to Kubernetes clusters (ACK & EKS)"
          else
            # staging环境：阿里云走ECS，AWS走EKS
            DEPLOY_TYPE="mixed"
            echo "Deploying STAGING: Aliyun to ECS, AWS to EKS"
          fi
          echo "deploy_type=$DEPLOY_TYPE" >> $GITHUB_OUTPUT
          
          # 确定各平台的命名空间
          # AWS EKS 命名空间: staging -> knowhere-staging, prod -> knowhere-prod
          # 阿里云 ACK 命名空间: 固定为 knowhere
          if [ "$ENVIRONMENT" == "prod" ]; then
            AWS_EKS_NAMESPACE="knowhere-prod"
          else
            AWS_EKS_NAMESPACE="knowhere-staging"
          fi
          ALIYUN_ACK_NAMESPACE="knowhere"
          
          echo "aws_eks_namespace=$AWS_EKS_NAMESPACE" >> $GITHUB_OUTPUT
          echo "aliyun_ack_namespace=$ALIYUN_ACK_NAMESPACE" >> $GITHUB_OUTPUT
          
          # 输出部署目标信息
          echo "AWS EKS 目标: 集群 ${{ env.AWS_EKS_PROD_CLUSTER_NAME }}, 命名空间 $AWS_EKS_NAMESPACE"
          echo "Aliyun ACK 目标: 集群 ${{ env.ALIYUN_ACK_PROD_CLUSTER_ID }}, 命名空间 $ALIYUN_ACK_NAMESPACE"
          if [ "$ENVIRONMENT" == "staging" ]; then
            echo "Aliyun ECS 目标: 实例 ${{ env.ALIYUN_ECS_STAGING_INSTANCE_ID }}"
          fi
          
          # 判断当前服务是否应该部署到AWS
          # AWS环境不需要web服务
          if [ "$SERVICE" == "web" ]; then
            echo "skip_aws_deploy=true" >> $GITHUB_OUTPUT
            echo "⚠️ Web服务不会部署到AWS环境"
          else
            echo "skip_aws_deploy=false" >> $GITHUB_OUTPUT
          fi
      
      # 阿里云 ACK 部署步骤
      - name: Deploy to Aliyun ACK (生产环境)
        if: ${{ false }} # Temporarily disable all Aliyun deploys
        env:
         ALIYUN_ACK_KUBECONFIG: ${{ secrets.ALIYUN_ACK_KUBECONFIG }} 
        run: |
          echo "🚀 Deploying ${{ matrix.service }} to Aliyun ACK Production Cluster"

          ACK_KUBECONFIG_FILE="ack_kubeconfig.yaml"
          echo "$ALIYUN_ACK_KUBECONFIG" > "$ACK_KUBECONFIG_FILE"
          echo "✅ Kubeconfig 文件已从 Secret 生成"
          
          # 使用ACR镜像（阿里云环境优先使用ACR）
          IMAGE="${{ env.ACR_IMAGE_URI }}"
          if [ -z "$IMAGE" ] || [ "$IMAGE" = "null" ]; then
            IMAGE="${{ env.GHCR_IMAGE_URI }}"
          fi
          
          echo "Using image: $IMAGE"
          DEPLOYMENT_NAME="knowhere-${{ matrix.service }}"
          NAMESPACE="${{ steps.deploy-type.outputs.aliyun_ack_namespace }}" 
          echo "Deployment名称: $DEPLOYMENT_NAME"
          echo "容器名称: ${{ matrix.service }}"
          echo "命名空间: $NAMESPACE"
          
          if ! kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" get deployment "$DEPLOYMENT_NAME" -n $NAMESPACE > /dev/null 2>&1; then
            echo "❌ 错误：Deployment $DEPLOYMENT_NAME 在命名空间 $NAMESPACE 中不存在"
            echo "请先确认以下Deployment是否存在："
            kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" get deployments -n $NAMESPACE
            exit 1
          fi
          
          # 检查Deployment中的容器名称
          echo "检查Deployment中的容器信息..."
          kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" get deployment "$DEPLOYMENT_NAME" -n $NAMESPACE -o jsonpath='{.spec.template.spec.containers[*].name}'
          echo ""
          
          # 更新K8s Deployment - 使用正确的Deployment名称和容器名称
          echo "更新Deployment $DEPLOYMENT_NAME 的镜像..."
          kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" set image deployment/"$DEPLOYMENT_NAME" \
            ${{ matrix.service }}=$IMAGE \
            --namespace=$NAMESPACE
          
          # 验证部署状态
          echo "验证部署状态..."
          MAX_ATTEMPTS=10
          ATTEMPT=1
          ROLLOUT_SUCCESS=false
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "检查部署状态 (尝试 $ATTEMPT/$MAX_ATTEMPTS)..."
            
            # 检查rollout状态
            if kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" rollout status deployment/"$DEPLOYMENT_NAME" \
              --namespace="$NAMESPACE" \
              --timeout=60s 2>&1 | tee /tmp/rollout-status.txt; then
              echo "✅ 部署成功完成！"
              ROLLOUT_SUCCESS=true
              break
            else
              echo "⚠️ 部署检查未完成，等待后重试..."
              
              # 检查Pod状态以提供更多信息
              echo "当前Pod状态:"
              kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" get pods -n "$NAMESPACE" -l app="$DEPLOYMENT_NAME" -o wide
              
              # 检查Pod事件
              echo "Pod事件:"
              kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" get events -n "$NAMESPACE" --field-selector involvedObject.kind=Pod --sort-by='.lastTimestamp' | grep "$DEPLOYMENT_NAME" | tail -5
              
              # 如果Pod存在，检查容器状态
              POD_NAME=$(kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" get pods -n "$NAMESPACE" -l app="$DEPLOYMENT_NAME" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
              if [ -n "$POD_NAME" ]; then
                echo "容器状态:"
                kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" get pod "$POD_NAME" -n "$NAMESPACE" -o jsonpath='{.status.containerStatuses[*].name}{" : "}{.status.containerStatuses[*].ready}{"\n"}'
              fi
              
              # 等待一段时间后重试
              sleep 30
              ATTEMPT=$((ATTEMPT + 1))
            fi
          done
          
          if [ "$ROLLOUT_SUCCESS" = false ]; then
            echo "❌ 部署检查超时，达到最大重试次数 ($MAX_ATTEMPTS)"
            
            # 提供更详细的错误信息
            echo "=== 详细错误诊断 ==="
            echo "1. Deployment状态:"
            kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" describe deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE"
            
            echo "2. Pod状态:"
            kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" get pods -n "$NAMESPACE" -l app="$DEPLOYMENT_NAME" -o wide
            
            echo "3. Pod详细状态:"
            for POD in $(kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" get pods -n "$NAMESPACE" -l app="$DEPLOYMENT_NAME" -o name); do
              echo "Pod: $POD"
              kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" describe "$POD" -n "$NAMESPACE" | grep -A 10 "Events:"
            done
            
            # 尝试获取容器日志
            echo "4. 容器日志 (最后50行):"
            for POD in $(kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" get pods -n "$NAMESPACE" -l app="$DEPLOYMENT_NAME" -o jsonpath='{.items[*].metadata.name}'); do
              echo "=== Pod $POD 日志 ==="
              kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" logs "$POD" -n "$NAMESPACE" --tail=50 2>/dev/null || echo "无法获取日志"
            done
            
            exit 1
          fi
          
          # 额外检查服务是否真的可用
          echo "执行最终健康检查..."
          HEALTH_CHECK_ATTEMPTS=6
          HEALTH_ATTEMPT=1
          
          while [ $HEALTH_ATTEMPT -le $HEALTH_CHECK_ATTEMPTS ]; do
            echo "健康检查 (尝试 $HEALTH_ATTEMPT/$HEALTH_CHECK_ATTEMPTS)..."
            
            # 检查所有Pod是否都就绪
            READY_PODS=$(kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            DESIRED_PODS=$(kubectl --kubeconfig="$ACK_KUBECONFIG_FILE" get deployment "$DEPLOYMENT_NAME" -n "$NAMESPACE" -o jsonpath='{.status.replicas}' 2>/dev/null || echo "0")
            
            if [ "$READY_PODS" = "$DESIRED_PODS" ] && [ "$READY_PODS" != "0" ]; then
              echo "✅ 所有Pod都已就绪 ($READY_PODS/$DESIRED_PODS)"
              break
            else
              echo "⚠️ Pod就绪状态: $READY_PODS/$DESIRED_PODS"
              sleep 10
              HEALTH_ATTEMPT=$((HEALTH_ATTEMPT + 1))
            fi
          done
          
          if [ $HEALTH_ATTEMPT -gt $HEALTH_CHECK_ATTEMPTS ]; then
            echo "⚠️ 健康检查未完全通过，但部署已更新。Pod就绪状态: $READY_PODS/$DESIRED_PODS"
          fi
          
          echo "✅ ${{ matrix.service }} deployed to Aliyun ACK"
      
      # AWS EKS 部署步骤 - 统一处理生产和预发布
      - name: Deploy to AWS EKS
        if: |
          steps.check-deploy.outputs.should_deploy == 'true' && 
          steps.deploy-type.outputs.skip_aws_deploy == 'false' &&
          github.event_name != 'pull_request'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_EKS_PROD_REGION }}
        run: |
          ENVIRONMENT="${{ needs.build-and-push.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          
          echo "🚀 Deploying $SERVICE to AWS EKS ($ENVIRONMENT environment)"
          echo "目标集群: ${{ env.AWS_EKS_PROD_CLUSTER_NAME }}, 命名空间: ${{ steps.deploy-type.outputs.aws_eks_namespace }}"
          
          # 为此次运行生成独立的 kubeconfig 文件路径
          EKS_KUBECONFIG_FILE="eks_kubeconfig_${{ github.run_id }}_${ENVIRONMENT}.yaml"
          
          # 配置 AWS CLI 凭证
          aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
          aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
          aws configure set region $AWS_REGION
          
          # 动态生成 kubeconfig
          aws eks update-kubeconfig \
            --name ${{ env.AWS_EKS_PROD_CLUSTER_NAME }} \
            --region $AWS_REGION \
            --kubeconfig $EKS_KUBECONFIG_FILE
          
          echo "✅ Kubeconfig 已动态生成至: $EKS_KUBECONFIG_FILE"
          
          # 使用ECR镜像（AWS环境优先使用ECR）
          IMAGE="${{ env.ECR_IMAGE_URI }}"
          if [ -z "$IMAGE" ] || [ "$IMAGE" = "null" ]; then
            echo "⚠️ ECR镜像未找到，回退到ACR镜像"
            IMAGE="${{ env.ACR_IMAGE_URI }}"
          fi
          
          if [ -z "$IMAGE" ] || [ "$IMAGE" = "null" ]; then
            echo "❌ 错误：没有找到可用的镜像URI"
            exit 1
          fi
          
          echo "使用镜像: $IMAGE"
          
          # 使用动态生成的配置文件执行部署
          kubectl --kubeconfig="$EKS_KUBECONFIG_FILE" set image deployment/knowhere-$SERVICE \
            $SERVICE="$IMAGE" \
            --namespace=${{ steps.deploy-type.outputs.aws_eks_namespace }}
          
          # 验证部署状态
          kubectl --kubeconfig="$EKS_KUBECONFIG_FILE" rollout status deployment/knowhere-$SERVICE \
            --namespace=${{ steps.deploy-type.outputs.aws_eks_namespace }} \
            --timeout=300s
          
          echo "✅ knowhere-$SERVICE 已成功部署到 AWS EKS (${{ steps.deploy-type.outputs.aws_eks_namespace }})"
  
      - name: Set up Aliyun CLI for ECS deployment
        if: ${{ false }} # Temporarily disable all Aliyun deploys
        uses: aliyun/setup-aliyun-cli-action@v1
        with:
          access-key-id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          region: ${{ secrets.ALIYUN_REGION }}
  
      # 阿里云 ECS 部署步骤（仅预发布环境）
      - name: Deploy to Aliyun ECS via Docker Compose (预发布环境)
        if: ${{ false }} # Temporarily disable all Aliyun deploys
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_REGION: ${{ secrets.ALIYUN_REGION }}
        run: |
          echo "🚀 开始部署 ${{ matrix.service }} 服务到阿里云ECS（通过Docker Compose）"

          echo "配置阿里云CLI凭据..."
          aliyun configure set --profile default \
            --access-key-id $ALIYUN_ACCESS_KEY_ID \
            --access-key-secret $ALIYUN_ACCESS_KEY_SECRET \
            --region $ALIYUN_REGION
          
          # 使用ACR镜像（阿里云环境优先使用ACR）
          IMAGE="${{ env.ACR_IMAGE_URI }}"
          if [ -z "$IMAGE" ] || [ "$IMAGE" = "null" ]; then
            echo "⚠️ ACR镜像未找到，回退到GHCR镜像"
            IMAGE="${{ env.GHCR_IMAGE_URI }}"
          fi
          
          echo "📦 镜像地址: $IMAGE"
          
          if [ -f ".github/scripts/deploy-ecs.sh" ]; then
            DEPLOY_SCRIPT_CONTENT=$(cat .github/scripts/deploy-ecs.sh | sed -e "s/{{serviceName}}/${{ matrix.service }}/g" -e "s|{{imageFull}}|$IMAGE|g")
            echo "✅ 部署脚本参数替换完成"
          else
            echo "错误: 找不到部署脚本 .github/scripts/deploy-ecs.sh"
            exit 1
          fi
          
          # 发送到ECS执行
          echo "正在向ECS实例发送部署命令..."
          RAW_OUTPUT=$(aliyun ecs RunCommand \
            --InstanceId.1 "${{ env.ALIYUN_ECS_STAGING_INSTANCE_ID }}" \
            --RegionId "$ALIYUN_REGION" \
            --Type RunShellScript \
            --CommandContent "$DEPLOY_SCRIPT_CONTENT" \
            --Timeout 600)
  
          echo "命令原始返回: $RAW_OUTPUT"
          # 从返回信息中提取 InvokeId
          INVOKE_ID=$(echo "$RAW_OUTPUT" | grep -oP '(?<="InvokeId": ")[^"]+' | head -1)
  
          if [[ -z "$INVOKE_ID" ]]; then
            echo "❌ 无法从命令返回中提取执行ID (InvokeId)，可能命令发送失败。"
            echo "请检查上方命令的原始输出。"
            exit 1
          fi
          echo "命令已发送，执行ID为: $INVOKE_ID"
  
          # 轮询查询执行结果
          MAX_POLL=30
          POLL_INTERVAL=10
          for ((i=1; i<=MAX_POLL; i++)); do
              echo "正在查询执行状态 ($i/$MAX_POLL)..."
              INVOCATION_RAW=$(aliyun ecs DescribeInvocationResults \
                --RegionId "$ALIYUN_REGION" \
                --InstanceId "${{ env.ALIYUN_ECS_STAGING_INSTANCE_ID }}" \
                --InvokeId "$INVOKE_ID" 2>/dev/null)
  
              STATUS=$(echo "$INVOCATION_RAW" | grep -oP '(?<="InvocationStatus": ")[^"]+' | head -1)
              EXIT_CODE=$(echo "$INVOCATION_RAW" | grep -oP '(?<="ExitCode": )[0-9]+' | head -1)
              
              if [[ "$STATUS" == "Success" ]]; then
                  echo "✅ ECS实例上的脚本执行成功。"
                  break
              elif [[ "$STATUS" == "Failed" ]]; then
                  echo "❌ ECS实例上的脚本执行失败，退出码: $EXIT_CODE"
                  # 尝试提取错误信息
                  ERROR_INFO=$(echo "$INVOCATION_RAW" | grep -oP '(?<="ErrorInfo": ")[^"]+' | head -1 2>/dev/null || echo "未知错误")
                  echo "错误信息: $ERROR_INFO"
                  exit 1
              elif [[ "$STATUS" == "Running" ]]; then
                  echo "脚本仍在执行中，${POLL_INTERVAL}秒后再次检查..."
                  sleep $POLL_INTERVAL
              else
                  echo "当前状态: '$STATUS'，等待后重试..."
                  sleep $POLL_INTERVAL
              fi
              
              if [[ $i -eq $MAX_POLL ]]; then
                  echo "❌ 轮询超时，未能获取最终执行状态。"
                  exit 1
              fi
          done
          
          echo "✅ ${{ matrix.service }} 部署完成"
      
      - name: Deployment summary
        if: steps.check-deploy.outputs.should_deploy == 'true'
        run: |
          ENVIRONMENT="${{ needs.build-and-push.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          IS_PR="${{ needs.build-and-push.outputs.is_pr }}"
          
          echo "🎉 Deployment Summary"
          echo "====================================="
          echo "Service: $SERVICE"
          echo "Environment: $ENVIRONMENT"
          echo "Deployment Type: ${{ steps.deploy-type.outputs.deploy_type }}"
          echo "Event Type: ${{ github.event_name }}"
          if [ "$IS_PR" == "true" ]; then
            echo "PR Number: ${{ github.event.pull_request.number }}"
          fi
          
          if [ "$SERVICE" == "web" ] && [ "${{ steps.deploy-type.outputs.skip_aws_deploy }}" == "true" ]; then
            echo "⚠️ Web服务仅在阿里云环境部署，AWS环境已跳过"
          fi
          
          # 显示使用的镜像
          if [ -n "${{ env.ECR_IMAGE_URI }}" ] && [ "${{ env.ECR_IMAGE_URI }}" != "null" ]; then
            echo "Image: ${{ env.ECR_IMAGE_URI }}"
          elif [ -n "${{ env.ACR_IMAGE_URI }}" ] && [ "${{ env.ACR_IMAGE_URI }}" != "null" ]; then
            echo "Image: ${{ env.ACR_IMAGE_URI }}"
          else
            echo "Image: ${{ env.GHCR_IMAGE_URI }}"
          fi
          
          echo ""
          echo "Next steps:"
          echo "- Verify service health checks"
          echo "- Monitor application logs"
          echo "- Run integration tests (if applicable)"
