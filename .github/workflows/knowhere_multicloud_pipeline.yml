name: CI/CD Pipeline - Production & Staging

on:
  #push:
  #  branches: [main, staging]
  #  tags:
  #    - 'v*'
  #pull_request:
  #  branches: [main]
  workflow_dispatch:
    inputs:
      target_environment:
        description: '强制部署到指定环境'
        required: true
        type: choice
        options:
          - staging
          - prod
      service:
        description: '服务选择（空=全部）'
        required: false
        type: choice
        options:
          - all
          - api
          - worker
      simulate_only:
        description: '仅模拟流程，不实际部署'
        required: false
        type: boolean
        default: false

env:
  # 容器注册表配置
  REGISTRY: ghcr.io
  ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}
  # AWS ECR配置（硬编码）
  ECR_REGISTRY: 107424103509.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: knowhere
  
  # 集群配置（仅生产环境）
  ALIYUN_ACK_PROD_CLUSTER_ID: ${{ secrets.ALIYUN_ACK_PROD_CLUSTER_ID }}
  AWS_EKS_PROD_CLUSTER_NAME: ${{ secrets.AWS_EKS_PROD_CLUSTER_NAME }}
  AWS_EKS_PROD_REGION: ${{ secrets.AWS_EKS_PROD_REGION }}
  ALIYUN_ECS_STAGING_INSTANCE_ID: ${{ secrets.ALIYUN_ECS_STAGING_INSTANCE_ID }}

jobs:
  # Job 1: 构建和推送镜像
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service: [api, worker]  # 移除了web
        include:
          - service: api
            dockerfile: deploy/docker/Dockerfile.api
            image_name: knowhere-backend
            ecr_repo_name: knowhere-backend  # ECR仓库名称
          - service: worker
            dockerfile: deploy/docker/Dockerfile.worker
            image_name: knowhere-worker
            ecr_repo_name: knowhere-worker  # ECR仓库名称
    
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.tags.outputs.image_tag }}
      acr_image_uri: ${{ steps.image-uris.outputs.acr_image_uri }}
      ghcr_image_uri: ${{ steps.image-uris.outputs.ghcr_image_uri }}
      ecr_image_uri: ${{ steps.image-uris.outputs.ecr_image_uri }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Determine target environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.target_environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]] || [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          else
            # PR或其他分支推送到staging环境
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi
          echo "Environment determined: ${{ steps.env.outputs.environment }}"

      
      - name: Generate image tag
        id: tags
        run: |
          ENVIRONMENT="${{ steps.env.outputs.environment }}"
          SHORT_SHA=${GITHUB_SHA:0:8}
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            GIT_TAG=$(echo "${{ github.ref }}" | sed 's|refs/tags/||')
            IMAGE_TAG="${GIT_TAG}-${ENVIRONMENT}"
          else
            IMAGE_TAG="${ENVIRONMENT}-${SHORT_SHA}"
          fi
          
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "latest_tag=${ENVIRONMENT}-latest" >> $GITHUB_OUTPUT
          echo "Generated tag: $IMAGE_TAG"
      
      - name: Generate image URIs
        id: image-uris
        run: |
          ENVIRONMENT="${{ steps.env.outputs.environment }}"
          IMAGE_TAG="${{ steps.tags.outputs.image_tag }}"
          LATEST_TAG="${{ steps.tags.outputs.latest_tag }}"
          
          # 将所有者名称和镜像名称都转换为小写
          OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME_LOWERCASE=$(echo "${{ matrix.image_name }}" | tr '[:upper:]' '[:lower:]')
          
          # GHCR镜像URI（强制小写）
          GHCR_URI="${{ env.REGISTRY }}/$OWNER_LOWERCASE/$IMAGE_NAME_LOWERCASE"
          echo "ghcr_image_uri=$GHCR_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "ghcr_latest_uri=$GHCR_URI:$LATEST_TAG" >> $GITHUB_OUTPUT
          
          # ACR镜像URI（如果配置了ACR）
          if [ -n "${{ env.ACR_REGISTRY }}" ]; then
            ACR_NAMESPACE_LOWERCASE=$(echo "${{ env.ACR_NAMESPACE }}" | tr '[:upper:]' '[:lower:]')
            ACR_URI="${{ env.ACR_REGISTRY }}/$ACR_NAMESPACE_LOWERCASE/$IMAGE_NAME_LOWERCASE"
            echo "acr_image_uri=$ACR_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT
            echo "acr_latest_uri=$ACR_URI:$LATEST_TAG" >> $GITHUB_OUTPUT
          fi
          
          # ECR镜像URI
          ECR_REPO_NAME="${{ matrix.ecr_repo_name }}"
          ECR_URI="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}/$ECR_REPO_NAME"
          echo "ecr_image_uri=$ECR_URI:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "ecr_latest_uri=$ECR_URI:$LATEST_TAG" >> $GITHUB_OUTPUT
      
      - name: Skip build for PR
        id: should-build
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "PR build, skipping push"
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Login to GitHub Container Registry
        if: steps.should-build.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Login to Alibaba Cloud Container Registry
        if: steps.should-build.outputs.should_build == 'true' && env.ACR_REGISTRY != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}
      
      - name: Configure AWS credentials for ECR
        if: steps.should-build.outputs.should_build == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1  # ECR所在区域
      
      - name: Login to AWS ECR
        if: steps.should-build.outputs.should_build == 'true'
        id: login-ecr
        run: |
          # 使用aws cli登录ECR
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
          echo "✅ Logged in to AWS ECR"
      
      - name: Build and push to registries
        if: steps.should-build.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.image-uris.outputs.ghcr_image_uri }}
            ${{ steps.image-uris.outputs.ghcr_latest_uri }}
            ${{ steps.image-uris.outputs.acr_image_uri }}
            ${{ steps.image-uris.outputs.acr_latest_uri }}
            ${{ steps.image-uris.outputs.ecr_image_uri }}
            ${{ steps.image-uris.outputs.ecr_latest_uri }}
          build-args: |
            ENVIRONMENT=${{ steps.env.outputs.environment }}
            APP_VERSION=${{ steps.tags.outputs.image_tag }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Record build summary
        if: steps.should-build.outputs.should_build == 'true'
        run: |
          echo "=== Build Summary ==="
          echo "Service: ${{ matrix.service }}"
          echo "Environment: ${{ steps.env.outputs.environment }}"
          echo "Image Tag: ${{ steps.tags.outputs.image_tag }}"
          echo "GHCR Image: ${{ steps.image-uris.outputs.ghcr_image_uri }}"
          if [ -n "${{ steps.image-uris.outputs.acr_image_uri }}" ]; then
            echo "ACR Image: ${{ steps.image-uris.outputs.acr_image_uri }}"
          fi
          echo "ECR Image: ${{ steps.image-uris.outputs.ecr_image_uri }}"

  # Job 2: 环境部署
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.simulate_only != 'true'
    
    strategy:
      matrix:
        service: [api, worker]  # 移除了web
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if should deploy this service
        id: check-deploy
        run: |
          INPUT_SERVICE="${{ github.event.inputs.service }}"
          CURRENT_SERVICE="${{ matrix.service }}"
          if [[ -z "$INPUT_SERVICE" || "$INPUT_SERVICE" == "all" || "$INPUT_SERVICE" == "$CURRENT_SERVICE" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ Will deploy service: $CURRENT_SERVICE"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "⏭️  Skipping service: $CURRENT_SERVICE (manual input specified: $INPUT_SERVICE)"
          fi

      - name: Determine deployment type and namespace
        id: deploy-type
        run: |
          ENVIRONMENT="${{ needs.build-and-push.outputs.environment }}"
          
          # 确定部署类型（基于环境和平台策略）
          if [ "$ENVIRONMENT" == "prod" ]; then
            DEPLOY_TYPE="k8s"
            echo "Deploying PRODUCTION to Kubernetes clusters (ACK & EKS)"
          else
            # staging环境：阿里云走ECS，AWS走EKS
            DEPLOY_TYPE="mixed"
            echo "Deploying STAGING: Aliyun to ECS, AWS to EKS"
          fi
          echo "deploy_type=$DEPLOY_TYPE" >> $GITHUB_OUTPUT
          
          # 确定各平台的命名空间
          # AWS EKS 命名空间: staging -> knowhere-staging, prod -> knowhere-prod
          # 阿里云 ACK 命名空间: 固定为 knowhere
          if [ "$ENVIRONMENT" == "prod" ]; then
            AWS_EKS_NAMESPACE="knowhere-prod"
          else
            AWS_EKS_NAMESPACE="knowhere-staging"
          fi
          ALIYUN_ACK_NAMESPACE="knowhere"
          
          echo "aws_eks_namespace=$AWS_EKS_NAMESPACE" >> $GITHUB_OUTPUT
          echo "aliyun_ack_namespace=$ALIYUN_ACK_NAMESPACE" >> $GITHUB_OUTPUT
          
          # 输出用于后续步骤判断的清晰目标
          echo "AWS EKS 目标: 集群 ${{ env.AWS_EKS_PROD_CLUSTER_NAME }}, 命名空间 $AWS_EKS_NAMESPACE"
          echo "Aliyun ACK 目标: 集群 ${{ env.ALIYUN_ACK_PROD_CLUSTER_ID }}, 命名空间 $ALIYUN_ACK_NAMESPACE"
          if [ "$ENVIRONMENT" == "staging" ]; then
            echo "Aliyun ECS 目标: 实例 ${{ env.ALIYUN_ECS_STAGING_INSTANCE_ID }}"
          fi
      
      # 阿里云 ACK 部署步骤
      - name: Deploy to Aliyun ACK (生产环境)
        if: steps.deploy-type.outputs.deploy_type == 'k8s' && steps.check-deploy.outputs.should_deploy == 'true'
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_REGION: ${{ secrets.ALIYUN_REGION }}
        run: |
          echo "🚀 Deploying ${{ matrix.service }} to Aliyun ACK Production Cluster"
          
          # 配置阿里云CLI
          aliyun configure set --profile default \
            --access-key-id $ALIYUN_ACCESS_KEY_ID \
            --access-key-secret $ALIYUN_ACCESS_KEY_SECRET \
            --region $ALIYUN_REGION
          
          # 获取ACK集群kubeconfig
          aliyun cs GetClusterKubeConfig \
            --ClusterId ${{ env.ALIYUN_ACK_PROD_CLUSTER_ID }} \
            --RegionId $ALIYUN_REGION > kubeconfig.yaml
          
          export KUBECONFIG=kubeconfig.yaml
          
          # 使用ACR镜像（阿里云环境优先使用ACR）
          IMAGE="${{ needs.build-and-push.outputs.acr_image_uri }}"
          if [ -z "$IMAGE" ]; then
            IMAGE="${{ needs.build-and-push.outputs.ghcr_image_uri }}"
          fi
          
          # 更新K8s Deployment
          kubectl set image deployment/${{ matrix.service }} \
            ${{ matrix.service }}=$IMAGE \
            --namespace=prod
          
          # 验证部署状态
          kubectl rollout status deployment/${{ matrix.service }} \
            --namespace=prod \
            --timeout=300s
          
          echo "✅ ${{ matrix.service }} deployed to Aliyun ACK"
      
      # AWS EKS 部署步骤 - 统一处理生产和预发布
      - name: Deploy to AWS EKS
        if: steps.check-deploy.outputs.should_deploy == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_EKS_PROD_REGION }}
        run: |
          ENVIRONMENT="${{ needs.build-and-push.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          
          echo "🚀 Deploying $SERVICE to AWS EKS ($ENVIRONMENT environment)"
          echo "目标集群: ${{ env.AWS_EKS_PROD_CLUSTER_NAME }}, 命名空间: ${{ steps.deploy-type.outputs.aws_eks_namespace }}"
          
          # 为此次运行生成独立的 kubeconfig 文件路径
          EKS_KUBECONFIG_FILE="eks_kubeconfig_${{ github.run_id }}_${ENVIRONMENT}.yaml"
          
          # 配置 AWS CLI 凭证
          aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID
          aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY
          aws configure set region $AWS_REGION
          
          # 动态生成 kubeconfig
          aws eks update-kubeconfig \
            --name ${{ env.AWS_EKS_PROD_CLUSTER_NAME }} \
            --region $AWS_REGION \
            --kubeconfig $EKS_KUBECONFIG_FILE
          
          echo "✅ Kubeconfig 已动态生成至: $EKS_KUBECONFIG_FILE"
          
          # 使用ECR镜像（AWS环境优先使用ECR）
          IMAGE="${{ needs.build-and-push.outputs.ecr_image_uri }}"
          if [ -z "$IMAGE" ]; then
            echo "⚠️ ECR镜像未找到，回退到ACR镜像"
            IMAGE="${{ needs.build-and-push.outputs.acr_image_uri }}"
          fi
          
          if [ -z "$IMAGE" ]; then
            echo "❌ 错误：没有找到可用的镜像URI"
            exit 1
          fi
          
          echo "使用镜像: $IMAGE"
          
          # 使用动态生成的配置文件执行部署
          kubectl --kubeconfig="$EKS_KUBECONFIG_FILE" set image deployment/knowhere-$SERVICE \
            $SERVICE="$IMAGE" \
            --namespace=${{ steps.deploy-type.outputs.aws_eks_namespace }}
          
          # 验证部署状态
          kubectl --kubeconfig="$EKS_KUBECONFIG_FILE" rollout status deployment/knowhere-$SERVICE \
            --namespace=${{ steps.deploy-type.outputs.aws_eks_namespace }} \
            --timeout=300s
          
          echo "✅ knowhere-$SERVICE 已成功部署到 AWS EKS (${{ steps.deploy-type.outputs.aws_eks_namespace }})"

      - name: Set up Aliyun CLI
        if: steps.check-deploy.outputs.should_deploy == 'true' && steps.deploy-type.outputs.deploy_type == 'mixed'
        uses: aliyun/setup-aliyun-cli-action@v1
        with:
          access-key-id: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          region: ${{ secrets.ALIYUN_REGION }}

      # 阿里云 ECS 部署步骤（仅预发布环境）
      - name: Deploy to Aliyun ECS via Docker Compose (预发布环境)
        if: steps.deploy-type.outputs.deploy_type == 'mixed' && steps.check-deploy.outputs.should_deploy == 'true'
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_REGION: ${{ secrets.ALIYUN_REGION }}
        run: |
          echo "🚀 开始部署 ${{ matrix.service }} 服务到阿里云ECS（通过Docker Compose）"
          
          # 配置阿里云CLI
          aliyun configure set --profile default \
            --access-key-id $ALIYUN_ACCESS_KEY_ID \
            --access-key-secret $ALIYUN_ACCESS_KEY_SECRET \
            --region $ALIYUN_REGION
          
          # 使用ACR镜像（阿里云环境优先使用ACR）
          IMAGE="${{ needs.build-and-push.outputs.acr_image_uri }}"
          if [ -z "$IMAGE" ]; then
            echo "⚠️ ACR镜像未找到，回退到GHCR镜像"
            IMAGE="${{ needs.build-and-push.outputs.ghcr_image_uri }}"
          fi
          
          echo "📦 镜像地址: $IMAGE"
          
          if [ -f ".github/scripts/deploy-ecs.sh" ]; then
            DEPLOY_SCRIPT_CONTENT=$(cat .github/scripts/deploy-ecs.sh | sed -e "s/{{serviceName}}/${{ matrix.service }}/g" -e "s|{{imageFull}}|$IMAGE|g")
            echo "✅ 部署脚本参数替换完成"
          else
            echo "错误: 找不到部署脚本 .github/scripts/deploy-ecs.sh"
            exit 1
          fi
          
          # 发送到ECS执行
          echo "正在向ECS实例发送部署命令..."
          RAW_OUTPUT=$(aliyun ecs RunCommand \
            --InstanceId.1 "${{ env.ALIYUN_ECS_STAGING_INSTANCE_ID }}" \
            --RegionId "$ALIYUN_REGION" \
            --Type RunShellScript \
            --CommandContent "$DEPLOY_SCRIPT_CONTENT" \
            --Timeout 600)

          echo "命令原始返回: $RAW_OUTPUT"
          # 从返回信息中提取 InvokeId
          INVOKE_ID=$(echo "$RAW_OUTPUT" | grep -oP '(?<="InvokeId": ")[^"]+' | head -1)

          if [[ -z "$INVOKE_ID" ]]; then
            echo "❌ 无法从命令返回中提取执行ID (InvokeId)，可能命令发送失败。"
            echo "请检查上方命令的原始输出。"
            exit 1
          fi
          echo "命令已发送，执行ID为: $INVOKE_ID"

          # 轮询查询执行结果
          MAX_POLL=30
          POLL_INTERVAL=10
          for ((i=1; i<=MAX_POLL; i++)); do
              echo "正在查询执行状态 ($i/$MAX_POLL)..."
              INVOCATION_RAW=$(aliyun ecs DescribeInvocationResults \
                --RegionId "$ALIYUN_REGION" \
                --InstanceId "${{ env.ALIYUN_ECS_STAGING_INSTANCE_ID }}" \
                --InvokeId "$INVOKE_ID" 2>/dev/null)

              STATUS=$(echo "$INVOCATION_RAW" | grep -oP '(?<="InvocationStatus": ")[^"]+' | head -1)
              EXIT_CODE=$(echo "$INVOCATION_RAW" | grep -oP '(?<="ExitCode": )[0-9]+' | head -1)
              
              if [[ "$STATUS" == "Success" ]]; then
                  echo "✅ ECS实例上的脚本执行成功。"
                  break
              elif [[ "$STATUS" == "Failed" ]]; then
                  echo "❌ ECS实例上的脚本执行失败，退出码: $EXIT_CODE"
                  # 尝试提取错误信息
                  ERROR_INFO=$(echo "$INVOCATION_RAW" | grep -oP '(?<="ErrorInfo": ")[^"]+' | head -1 2>/dev/null || echo "未知错误")
                  echo "错误信息: $ERROR_INFO"
                  exit 1
              elif [[ "$STATUS" == "Running" ]]; then
                  echo "脚本仍在执行中，${POLL_INTERVAL}秒后再次检查..."
                  sleep $POLL_INTERVAL
              else
                  echo "当前状态: '$STATUS'，等待后重试..."
                  sleep $POLL_INTERVAL
              fi
              
              if [[ $i -eq $MAX_POLL ]]; then
                  echo "❌ 轮询超时，未能获取最终执行状态。"
                  exit 1
              fi
          done
          
          echo "✅ ${{ matrix.service }} 部署完成"
      
      - name: Deployment summary
        if: steps.check-deploy.outputs.should_deploy == 'true'
        run: |
          echo "🎉 Deployment Completed Successfully!"
          echo "====================================="
          echo "Service: ${{ matrix.service }}"
          echo "Environment: ${{ needs.build-and-push.outputs.environment }}"
          echo "Deployment Type: ${{ steps.deploy-type.outputs.deploy_type }}"
          echo "Image Tag: ${{ needs.build-and-push.outputs.image_tag }}"
          echo ""
          echo "Next steps:"
          echo "- Verify service health checks"
          echo "- Monitor application logs"
          echo "- Run integration tests (if applicable)"
