name: Deploy to AWS

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    branches: [ main, staging ]
    types:
      - completed

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: knowhere

jobs:
  deploy-main:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' && 
      github.event.workflow_run.head_branch == 'main'
    permissions:
      contents: read
      checks: read
      packages: read
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.0
    
    - name: Terraform Init
      run: |
        cd deploy/aws/terraform
        terraform init
    
    - name: Terraform Plan
      run: |
        cd deploy/aws/terraform
        terraform plan -out=tfplan
    
    - name: Terraform Apply
      run: |
        cd deploy/aws/terraform
        terraform apply -auto-approve tfplan
    
    - name: Update ECS Services
      run: |
        # 更新后端服务
        aws ecs update-service \
          --cluster ${{ env.PROJECT_NAME }}-cluster \
          --service ${{ env.PROJECT_NAME }}-backend-service \
          --force-new-deployment \
          --region ${{ env.AWS_REGION }}
        
        # 更新前端服务
        aws ecs update-service \
          --cluster ${{ env.PROJECT_NAME }}-cluster \
          --service ${{ env.PROJECT_NAME }}-frontend-service \
          --force-new-deployment \
          --region ${{ env.AWS_REGION }}
    
    - name: Wait for deployment
      run: |
        aws ecs wait services-stable \
          --cluster ${{ env.PROJECT_NAME }}-cluster \
          --services ${{ env.PROJECT_NAME }}-backend-service \
          --region ${{ env.AWS_REGION }}
        
        aws ecs wait services-stable \
          --cluster ${{ env.PROJECT_NAME }}-cluster \
          --services ${{ env.PROJECT_NAME }}-frontend-service \
          --region ${{ env.AWS_REGION }}

  deploy-staging:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' && 
      github.event.workflow_run.head_branch == 'staging'
    permissions:
      contents: read
      checks: read
      packages: read
    
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.workflow_run.head_sha }}
    
    - name: Get image tag
      id: image-tag
      run: |
        IMAGE_TAG="staging-latest"
        echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
    
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.AWS_EC2_SSH_KEY }}
    
    - name: Deploy to EC2
      run: |
        chmod +x deploy/aws/scripts/deploy-to-ec2.sh
        export IMAGE_TAG="${{ steps.image-tag.outputs.tag }}"
        export EC2_HOST="${{ secrets.AWS_EC2_HOST }}"
        export EC2_USER="${{ secrets.AWS_EC2_USER }}"
        export GITHUB_USERNAME="${{ github.repository_owner }}"
        # 注意：GITHUB_TOKEN 需要在服务器上预先配置，或通过其他方式传递
        deploy/aws/scripts/deploy-to-ec2.sh
