name: Deploy to AWS

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: knowhere

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install Python dependencies
      run: |
        cd apps/api
        pip install -r requirements.txt
    
    - name: Run Python tests
      run: |
        cd apps/api
        python -m pytest tests/ -v
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'pnpm'
    
    - name: Install pnpm
      run: npm install -g pnpm
    
    - name: Install frontend dependencies
      run: |
        cd apps/web
        pnpm install
    
    - name: Run frontend tests
      run: |
        cd apps/web
        pnpm run type-check
        pnpm run lint

  deploy-main:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      checks: read
      packages: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Wait for build images
      uses: lewagon/wait-on-check-action@v1.3.2
      with:
        ref: ${{ github.ref }}
        check-name: 'Build and Push Docker Images'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        wait-interval: 10
        allowed-conclusions: success
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.0
    
    - name: Terraform Init
      run: |
        cd deploy/aws/terraform
        terraform init
    
    - name: Terraform Plan
      run: |
        cd deploy/aws/terraform
        terraform plan -out=tfplan
    
    - name: Terraform Apply
      run: |
        cd deploy/aws/terraform
        terraform apply -auto-approve tfplan
    
    - name: Update ECS Services
      run: |
        # 更新后端服务
        aws ecs update-service \
          --cluster ${{ env.PROJECT_NAME }}-cluster \
          --service ${{ env.PROJECT_NAME }}-backend-service \
          --force-new-deployment \
          --region ${{ env.AWS_REGION }}
        
        # 更新前端服务
        aws ecs update-service \
          --cluster ${{ env.PROJECT_NAME }}-cluster \
          --service ${{ env.PROJECT_NAME }}-frontend-service \
          --force-new-deployment \
          --region ${{ env.AWS_REGION }}
    
    - name: Wait for deployment
      run: |
        aws ecs wait services-stable \
          --cluster ${{ env.PROJECT_NAME }}-cluster \
          --services ${{ env.PROJECT_NAME }}-backend-service \
          --region ${{ env.AWS_REGION }}
        
        aws ecs wait services-stable \
          --cluster ${{ env.PROJECT_NAME }}-cluster \
          --services ${{ env.PROJECT_NAME }}-frontend-service \
          --region ${{ env.AWS_REGION }}

  deploy-staging:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    permissions:
      contents: read
      checks: read
      packages: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Wait for build images
      uses: lewagon/wait-on-check-action@v1.3.2
      with:
        ref: ${{ github.ref }}
        check-name: 'Build and Push Docker Images'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        wait-interval: 10
        allowed-conclusions: success
    
    - name: Get image tag
      id: image-tag
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          GIT_TAG=$(echo "${{ github.ref }}" | sed 's|refs/tags/||')
          IMAGE_TAG="${GIT_TAG}-staging"
        else
          IMAGE_TAG="staging-latest"
        fi
        echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
    
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.AWS_EC2_SSH_KEY }}
    
    - name: Deploy to EC2
      run: |
        chmod +x deploy/aws/scripts/deploy-to-ec2.sh
        export IMAGE_TAG="${{ steps.image-tag.outputs.tag }}"
        export EC2_HOST="${{ secrets.AWS_EC2_HOST }}"
        export EC2_USER="${{ secrets.AWS_EC2_USER }}"
        export GITHUB_USERNAME="${{ github.repository_owner }}"
        # 注意：GITHUB_TOKEN 需要在服务器上预先配置，或通过其他方式传递
        deploy/aws/scripts/deploy-to-ec2.sh
