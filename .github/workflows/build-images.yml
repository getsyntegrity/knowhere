name: Build and Push Docker Images

on:
  push:
    branches: [ main, staging ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, staging ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to build for'
        required: true
        type: choice
        options:
          - staging
          - prod
      service:
        description: 'Service to build (leave empty for all)'
        required: false
        type: choice
        options:
          - all
          - api
          - web
          - worker

env:
  REGISTRY: ghcr.io
  PROJECT_NAME: knowhere
  # ACR 配置（从 GitHub Secrets 读取）
  ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service: [api, web, worker]
        include:
          - service: api
            dockerfile: deploy/docker/Dockerfile.api
            image_name: knowhere-backend
          - service: web
            dockerfile: deploy/docker/Dockerfile.web
            image_name: knowhere-frontend
          - service: worker
            dockerfile: deploy/docker/Dockerfile.worker
            image_name: knowhere-worker
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Determine environment and branch
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
            if [ "${{ github.event.inputs.environment }}" == "prod" ]; then
              echo "branch=main" >> $GITHUB_OUTPUT
            else
              echo "branch=staging" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "branch=main" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "branch=main" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "branch=staging" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "branch=staging" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate version tags
        id: tags
        run: |
          ENVIRONMENT="${{ steps.env.outputs.environment }}"
          BRANCH_NAME="${{ steps.env.outputs.branch }}"
          GIT_TAG=$(echo "${{ github.ref }}" | sed 's|refs/tags/||')
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # 如果有 TAG，使用 TAG-分支名称格式
            VERSION="${GIT_TAG}-${BRANCH_NAME}"
            TAGS="${GIT_TAG}-${BRANCH_NAME},${BRANCH_NAME}-latest"
          else
            # 如果没有 TAG，使用分支名称-latest格式
            VERSION="${BRANCH_NAME}-latest"
            TAGS="${BRANCH_NAME}-latest"
          fi
          
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT
      
      - name: Determine API URLs
        id: api-urls
        run: |
          # 只有 web 服务需要 API URL
          if [ "${{ matrix.service }}" != "web" ]; then
            echo "api_url_ghcr=" >> $GITHUB_OUTPUT
            echo "api_url_acr=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          ENVIRONMENT="${{ steps.env.outputs.environment }}"
          HAS_ACR="${{ env.ACR_REGISTRY != '' }}"
          
          # 根据环境和仓库类型确定 API URL
          if [ "$ENVIRONMENT" == "prod" ]; then
            # Production 环境
            API_URL_GHCR="${{ secrets.PROD_GHCR_API_URL }}"
            API_URL_ACR="${{ secrets.PROD_ACR_API_URL }}"
            
            # 如果没有配置 Secret，使用默认值
            if [ -z "$API_URL_GHCR" ]; then
              API_URL_GHCR="https://api.knowhereto.ai"
            fi
            if [ -z "$API_URL_ACR" ]; then
              API_URL_ACR="https://api.knowhereto.com"
            fi
          else
            # Staging 环境
            API_URL_GHCR="${{ secrets.STAGING_GHCR_API_URL }}"
            API_URL_ACR="${{ secrets.STAGING_ACR_API_URL }}"
            
            # 如果没有配置 Secret，使用默认值
            if [ -z "$API_URL_GHCR" ]; then
              API_URL_GHCR="https://apitest.knowhereto.ai"
            fi
            if [ -z "$API_URL_ACR" ]; then
              API_URL_ACR="https://apitest.knowhereto.com"
            fi
          fi
          
          echo "api_url_ghcr=$API_URL_GHCR" >> $GITHUB_OUTPUT
          echo "api_url_acr=$API_URL_ACR" >> $GITHUB_OUTPUT
          echo "API URL for GHCR ($ENVIRONMENT): $API_URL_GHCR"
          if [ "$HAS_ACR" == "true" ]; then
            echo "API URL for ACR ($ENVIRONMENT): $API_URL_ACR"
          fi
      
      - name: Skip build for PR or filtered service
        id: should-build
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.service }}" != "" ] && [ "${{ github.event.inputs.service }}" != "all" ] && [ "${{ github.event.inputs.service }}" != "${{ matrix.service }}" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Login to GitHub Container Registry
        if: steps.should-build.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Login to Alibaba Cloud Container Registry
        if: steps.should-build.outputs.should_build == 'true' && env.ACR_REGISTRY != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}
      
      - name: Extract metadata for GHCR
        if: steps.should-build.outputs.should_build == 'true'
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ steps.tags.outputs.tags }}
      
      - name: Extract metadata for ACR
        if: steps.should-build.outputs.should_build == 'true' && env.ACR_REGISTRY != ''
        id: meta-acr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ steps.tags.outputs.tags }}
      
      - name: Build and push to GHCR
        if: steps.should-build.outputs.should_build == 'true'
        id: build-ghcr
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          build-args: |
            ENVIRONMENT=${{ steps.tags.outputs.environment }}
            APP_VERSION=${{ steps.tags.outputs.version }}
            BUILD_TIME=${{ github.event.head_commit.timestamp || github.event.pull_request.head.repo.updated_at || github.event.repository.updated_at }}
            GIT_COMMIT=${{ github.sha }}
            NEXT_PUBLIC_API_URL=${{ steps.api-urls.outputs.api_url_ghcr }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build and push to ACR
        if: steps.should-build.outputs.should_build == 'true' && env.ACR_REGISTRY != ''
        id: build-acr
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-acr.outputs.tags }}
          labels: ${{ steps.meta-acr.outputs.labels }}
          build-args: |
            ENVIRONMENT=${{ steps.tags.outputs.environment }}
            APP_VERSION=${{ steps.tags.outputs.version }}
            BUILD_TIME=${{ github.event.head_commit.timestamp || github.event.pull_request.head.repo.updated_at || github.event.repository.updated_at }}
            GIT_COMMIT=${{ github.sha }}
            NEXT_PUBLIC_API_URL=${{ steps.api-urls.outputs.api_url_acr }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image digest
        if: steps.should-build.outputs.should_build == 'true'
        run: |
          if [ -n "${{ steps.build-ghcr.outputs.digest }}" ]; then
            echo "GHCR image pushed with digest ${{ steps.build-ghcr.outputs.digest }}"
            echo "GHCR: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}:${{ steps.tags.outputs.environment }}-latest"
          fi
          if [ -n "${{ env.ACR_REGISTRY }}" ] && [ -n "${{ steps.build-acr.outputs.digest }}" ]; then
            echo "ACR image pushed with digest ${{ steps.build-acr.outputs.digest }}"
            echo "ACR: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.image_name }}:${{ steps.tags.outputs.environment }}-latest"
          fi

