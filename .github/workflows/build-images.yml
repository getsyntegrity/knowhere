name: Build and Push Docker Images

on:
  push:
    branches: [ main, dev, test ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, dev, test ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to build for'
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      service:
        description: 'Service to build (leave empty for all)'
        required: false
        type: choice
        options:
          - all
          - api
          - web
          - worker

env:
  REGISTRY: ghcr.io
  PROJECT_NAME: knowhere
  # ACR 配置（从 GitHub Secrets 读取）
  ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service: [api, web, worker]
        include:
          - service: api
            dockerfile: deploy/docker/Dockerfile.api
            image_name: knowhere-backend
          - service: web
            dockerfile: deploy/docker/Dockerfile.web
            image_name: knowhere-frontend
          - service: worker
            dockerfile: deploy/docker/Dockerfile.worker
            image_name: knowhere-worker
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/test" ]]; then
            echo "environment=test" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate version tags
        id: tags
        run: |
          ENVIRONMENT="${{ steps.env.outputs.environment }}"
          GIT_COMMIT_SHORT=$(git rev-parse --short HEAD)
          GIT_TAG=$(echo "${{ github.ref }}" | sed 's|refs/tags/||')
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="$GIT_TAG"
            TAGS="${ENVIRONMENT}-latest,${VERSION},${ENVIRONMENT}-${GIT_COMMIT_SHORT}"
          else
            VERSION="dev-${GIT_COMMIT_SHORT}"
            TAGS="${ENVIRONMENT}-latest,${VERSION},${ENVIRONMENT}-${GIT_COMMIT_SHORT}"
          fi
          
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "environment=$ENVIRONMENT" >> $GITHUB_OUTPUT
      
      - name: Skip build for PR or filtered service
        id: should-build
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ github.event.inputs.service }}" != "" ] && [ "${{ github.event.inputs.service }}" != "all" ] && [ "${{ github.event.inputs.service }}" != "${{ matrix.service }}" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Login to GitHub Container Registry
        if: steps.should-build.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Login to Alibaba Cloud Container Registry
        if: steps.should-build.outputs.should_build == 'true' && env.ACR_REGISTRY != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}
      
      - name: Extract metadata for GHCR
        if: steps.should-build.outputs.should_build == 'true'
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ steps.tags.outputs.tags }},enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
      
      - name: Extract metadata for ACR
        if: steps.should-build.outputs.should_build == 'true' && env.ACR_REGISTRY != ''
        id: meta-acr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ steps.tags.outputs.tags }},enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
      
      - name: Build and push to GHCR and ACR
        if: steps.should-build.outputs.should_build == 'true'
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta-ghcr.outputs.tags }}
            ${{ steps.meta-acr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          build-args: |
            ENVIRONMENT=${{ steps.tags.outputs.environment }}
            APP_VERSION=${{ steps.tags.outputs.version }}
            BUILD_TIME=${{ github.event.head_commit.timestamp || github.event.pull_request.head.repo.updated_at || github.event.repository.updated_at }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image digest
        if: steps.should-build.outputs.should_build == 'true' && steps.build.outputs.digest != ''
        run: |
          echo "Image pushed with digest ${{ steps.build.outputs.digest }}"
          echo "GHCR: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image_name }}:${{ steps.tags.outputs.environment }}-latest"
          if [ -n "${{ env.ACR_REGISTRY }}" ]; then
            echo "ACR: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ matrix.image_name }}:${{ steps.tags.outputs.environment }}-latest"
          fi

