name: Build Docker Images

on:
  push:
    branches:
      - main
      - staging
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: Target image environment
        required: true
        type: choice
        options:
          - staging
          - prod
      service:
        description: Service to build
        required: false
        type: choice
        options:
          - all
          - api
          - worker

env:
  REGISTRY: ghcr.io

jobs:
  build-pr-images:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    strategy:
      matrix:
        service: [api, worker]
        include:
          - service: api
            dockerfile: deploy/docker/Dockerfile.api
            image_name: knowhere-backend
          - service: worker
            dockerfile: deploy/docker/Dockerfile.worker
            image_name: knowhere-worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Decide build context
        id: context
        shell: bash
        run: |
          if [ "${{ github.base_ref }}" = "main" ]; then
            environment="prod"
          else
            environment="staging"
          fi

          echo "environment=$environment" >> "$GITHUB_OUTPUT"

      - name: Generate image tags
        id: tags
        shell: bash
        run: |
          environment="${{ steps.context.outputs.environment }}"
          short_sha="${GITHUB_SHA::8}"
          image_tag="pr-${{ github.event.pull_request.number }}-${short_sha}"
          latest_tag="${environment}-latest"

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Prepare registry tags
        id: images
        shell: bash
        run: |
          image_name="$(echo "${{ matrix.image_name }}" | tr '[:upper:]' '[:lower:]')"
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          image_tag="${{ steps.tags.outputs.image_tag }}"
          latest_tag="${{ steps.tags.outputs.latest_tag }}"

          echo "ghcr_image=${{ env.REGISTRY }}/${owner}/${image_name}:${image_tag}" >> "$GITHUB_OUTPUT"
          echo "ghcr_latest=${{ env.REGISTRY }}/${owner}/${image_name}:${latest_tag}" >> "$GITHUB_OUTPUT"

      - name: Build tag list
        id: tag-list
        shell: bash
        run: |
          {
            echo 'tags<<EOF'
            echo "${{ steps.images.outputs.ghcr_image }}"
            echo "${{ steps.images.outputs.ghcr_latest }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ steps.tag-list.outputs.tags }}
          build-args: |
            ENVIRONMENT=${{ steps.context.outputs.environment }}
            APP_VERSION=${{ steps.tags.outputs.image_tag }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.pull_request.updated_at || github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize build
        shell: bash
        run: |
          echo "Service: ${{ matrix.service }}"
          echo "Environment: ${{ steps.context.outputs.environment }}"
          echo "Push enabled: false"
          echo "Primary tag: ${{ steps.tags.outputs.image_tag }}"

  build-and-publish:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [api, worker]
        include:
          - service: api
            dockerfile: deploy/docker/Dockerfile.api
            image_name: knowhere-backend
          - service: worker
            dockerfile: deploy/docker/Dockerfile.worker
            image_name: knowhere-worker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Decide build context
        id: context
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            environment="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            environment="prod"
          else
            environment="staging"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.service }}" ] && [ "${{ github.event.inputs.service }}" != "all" ] && [ "${{ github.event.inputs.service }}" != "${{ matrix.service }}" ]; then
            should_build="false"
          else
            should_build="true"
          fi

          echo "environment=$environment" >> "$GITHUB_OUTPUT"
          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"

      - name: Generate image tags
        if: steps.context.outputs.should_build == 'true'
        id: tags
        shell: bash
        run: |
          environment="${{ steps.context.outputs.environment }}"
          short_sha="${GITHUB_SHA::8}"

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            git_tag="${GITHUB_REF#refs/tags/}"
            image_tag="${git_tag}-${environment}"
          else
            image_tag="${environment}-${short_sha}"
          fi

          latest_tag="${environment}-latest"

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Prepare registry tags
        if: steps.context.outputs.should_build == 'true'
        id: images
        shell: bash
        run: |
          image_name="$(echo "${{ matrix.image_name }}" | tr '[:upper:]' '[:lower:]')"
          owner="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          image_tag="${{ steps.tags.outputs.image_tag }}"
          latest_tag="${{ steps.tags.outputs.latest_tag }}"

          echo "ghcr_image=${{ env.REGISTRY }}/${owner}/${image_name}:${image_tag}" >> "$GITHUB_OUTPUT"
          echo "ghcr_latest=${{ env.REGISTRY }}/${owner}/${image_name}:${latest_tag}" >> "$GITHUB_OUTPUT"

      - name: Build tag list
        if: steps.context.outputs.should_build == 'true'
        id: tag-list
        shell: bash
        run: |
          {
            echo 'tags<<EOF'
            echo "${{ steps.images.outputs.ghcr_image }}"
            echo "${{ steps.images.outputs.ghcr_latest }}"

            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.context.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.context.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        if: steps.context.outputs.should_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ steps.context.outputs.should_build == 'true' }}
          tags: ${{ steps.tag-list.outputs.tags }}
          build-args: |
            ENVIRONMENT=${{ steps.context.outputs.environment }}
            APP_VERSION=${{ steps.tags.outputs.image_tag }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize build
        if: steps.context.outputs.should_build == 'true'
        shell: bash
        run: |
          echo "Service: ${{ matrix.service }}"
          echo "Environment: ${{ steps.context.outputs.environment }}"
          echo "Push enabled: true"
          echo "Primary tag: ${{ steps.tags.outputs.image_tag }}"
