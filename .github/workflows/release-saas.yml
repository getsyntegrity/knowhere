name: Release SaaS deployment

on:
  workflow_run:
    workflows:
      - Build and deploy API services
    branches:
      - main
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: release-saas-deployment-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  release:
    name: Create deployment release
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployed source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Choose date release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          base_tag="$(date -u +'%Y.%m.%d')"
          last_number="$(
            git tag --list "${base_tag}.*" \
              | sed -E "s/^${base_tag}\\.([0-9]+)$/\\1/" \
              | grep -E '^[0-9]+$' \
              | sort -n \
              | tail -1 \
              || true
          )"

          if [ -z "${last_number}" ]; then
            next_number=1
          else
            next_number=$((last_number + 1))
          fi

          release_tag="${base_tag}.${next_number}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Create source archive
        env:
          RELEASE_TAG: ${{ steps.release-tag.outputs.release_tag }}
          DEPLOYED_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          git archive --format=zip --output="release-assets/knowhere-api-${RELEASE_TAG}-source.zip" "${DEPLOYED_SHA}"

          cat > release-assets/build-info.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "release_tag": "${RELEASE_TAG}",
            "deployed_commit": "${DEPLOYED_SHA}",
            "workflow_run_id": "${{ github.event.workflow_run.id }}",
            "workflow_run_url": "${{ github.event.workflow_run.html_url }}"
          }
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.release_tag }}
          DEPLOYED_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${RELEASE_TAG}" \
            release-assets/knowhere-api-${RELEASE_TAG}-source.zip \
            release-assets/build-info.json \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${DEPLOYED_SHA}" \
            --title "${RELEASE_TAG}" \
            --generate-notes
