# Knowhere Nginx配置
# 主配置文件

# 上游服务器定义
upstream backend_api {
    server 127.0.0.1:5005;
    keepalive 32;
}

upstream web_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# 限制连接数
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=10r/s;

# API服务器配置
server {
    listen 80;
    server_name apitest.knowhereto.ai;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 限制连接和请求
    limit_conn conn_limit_per_ip 10;
    limit_req zone=req_limit_per_ip burst=20 nodelay;
    
    # 客户端最大请求体大小
    client_max_body_size 10M;
    
    # 超时设置
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # 代理到后端API
    location / {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 保持连接
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # 健康检查端点
    location /health {
        proxy_pass http://backend_api/health;
        access_log off;
    }
    
    # 静态文件缓存（如果有）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        proxy_pass http://backend_api;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # 日志配置
    access_log /var/log/nginx/knowhere-api-access.log;
    error_log /var/log/nginx/knowhere-api-error.log;
}

# Web前端服务器配置
server {
    listen 80;
    server_name test.knowhereto.ai;
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 限制连接和请求
    limit_conn conn_limit_per_ip 10;
    limit_req zone=req_limit_per_ip burst=20 nodelay;
    
    # 客户端最大请求体大小
    client_max_body_size 10M;
    
    # 超时设置
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # 代理到前端应用
    location / {
        proxy_pass http://web_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 保持连接
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # Next.js静态文件
    location /_next/static/ {
        proxy_pass http://web_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # 其他静态文件
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://web_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # 日志配置
    access_log /var/log/nginx/knowhere-web-access.log;
    error_log /var/log/nginx/knowhere-web-error.log;
}

# HTTPS重定向（如果启用SSL）
server {
    listen 443 ssl http2;
    server_name apitest.knowhereto.ai;
    
    # SSL配置
    ssl_certificate /etc/letsencrypt/live/apitest.knowhereto.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apitest.knowhereto.ai/privkey.pem;
    include /etc/nginx/ssl-params.conf;
    
    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
