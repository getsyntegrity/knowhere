version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: knowhere-test-postgres
    ports:
      - "5433:5432"  # 使用5433避免冲突
    environment:
      POSTGRES_DB: Knowhere
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root123
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ../local-dev/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - knowhere_test_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d Knowhere"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: knowhere-test-redis
    ports:
      - "6380:6379"  # 使用6380避免冲突
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_test_data:/data
    networks:
      - knowhere_test_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: knowhere-test-rabbitmq
    ports:
      - "5673:5672"    # AMQP端口（使用5673避免冲突）
      - "15673:15672"  # 管理界面端口（使用15673避免冲突）
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_test_data:/var/lib/rabbitmq
    networks:
      - knowhere_test_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MinIO 对象存储（用于S3兼容测试）
  minio:
    image: minio/minio:latest
    container_name: knowhere-test-minio
    ports:
      - "9002:9000"    # API端口（使用9002避免冲突）
      - "9003:9001"    # 控制台端口（使用9003避免冲突）
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_test_data:/data
      - ../local-dev/minio/init:/etc/minio/init
    networks:
      - knowhere_test_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # LocalStack AWS服务模拟
  localstack:
    image: localstack/localstack:3.8
    container_name: knowhere-test-localstack
    ports:
      - "4567:4566"    # LocalStack Edge端口（使用4567避免冲突）
    environment:
      SERVICES: s3,sns,sqs,lambda,iam,sts
      DEBUG: 1
      PERSISTENCE: 1
      DATA_DIR: /var/lib/localstack/data
      S3_SKIP_SIGNATURE_VALIDATION: 1
      S3_SKIP_SSL_VERIFICATION: 1
      HOSTNAME_EXTERNAL: localstack
      EDGE_PORT: 4566
      SNS_ENDPOINT_STRATEGY: domain
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - localstack_test_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ../local-dev/localstack/init:/etc/localstack/init/ready.d
    networks:
      - knowhere_test_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # API服务
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    image: knowhere-api:test
    container_name: knowhere-test-api
    ports:
      - "5005:5005"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      # 环境配置
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: INFO
      
      # 数据库配置
      DATABASE_URL: postgresql+asyncpg://root:root123@postgres:5432/Knowhere
      DB_SSL_MODE: disable
      
      # Redis配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DATABASE: 0
      
      # RabbitMQ配置
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin123
      RABBITMQ_VHOST: /
      CELERY_BROKER_URL: amqp://admin:admin123@rabbitmq:5672//
      CELERY_RESULT_BACKEND: rpc://
      MESSAGE_BROKER_TYPE: rabbitmq
      
      # 存储配置（使用MinIO）
      S3_TYPE: minio
      S3_BUCKET_NAME: knowhere
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin123
      S3_ENDPOINT_URL: http://minio:9000
      S3_PRIVATE_DOMAIN: http://minio:9000
      S3_REGION: ""
      S3_USE_SSL: "false"
      S3_ADDRESSING_STYLE: path
      S3_TEMP_PATH: /tmp
      S3_UPLOADS_BUCKET: knowhere-uploads
      S3_RESULTS_BUCKET: knowhere-results
      
      # 路径配置
      TMP_PATH: /tmp/aismart_bid
      FONT_PATH: /app/app/assets/fonts
      CHROMEDRIVER_PATH: /usr/bin/chromedriver
      USERS_DATA_PATH: /tmp/users
      
      # 安全配置
      SECRET_KEY: test-secret-key-for-docker-compose-test-$(date +%s)
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      USERS_VERIFY_TOKEN_SECRET: test-verify-token-secret
      USERS_RESET_PASSWORD_TOKEN_SECRET: test-reset-token-secret
      
      # Webhook配置
      WEBHOOK_SIGNING_SECRET: test-webhook-signing-secret
      S3_WEBHOOK_AUTH_TOKEN: test-minio-webhook-token
      SNS_SIGNATURE_VERIFICATION: "false"
      
      # AI模型配置（测试用）
      DS_KEY: test-deepseek-key
      DS_URL: https://api.deepseek.com/v1/chat/completions
      ALI_API_KEY: test-ali-key
      ALI_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
      EMBEDDING_MODEL: text-embedding-v1
      NORMOL_MODEL: gpt-3.5-turbo
      IMAGE_MODEL: gpt-4-vision-preview
      
      # 应用配置
      APP_TITLE: Konwhere AI知识库管理系统
      APP_VERSION: 1.0.0
      APP_DESCRIPTION: 基于AI的知识库管理和智能问答系统
      
      # 可选配置（测试环境可以留空）
      STRIPE_SECRET_KEY: ""
      STRIPE_PUBLISHABLE_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      RESEND_API_KEY: ""
      MOESIF_APPLICATION_ID: ""
      NEXT_PUBLIC_POSTHOG_KEY: ""
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GITHUB_CLIENT_ID: ""
      GITHUB_CLIENT_SECRET: ""
      APPLE_CLIENT_ID: ""
      APPLE_CLIENT_SECRET: ""
    volumes:
      - api_test_users_data:/tmp/users
      - api_test_tmp_data:/tmp/aismart_bid
    # 使用root用户启动以设置权限，然后entrypoint会切换到appuser
    user: "0:0"
    networks:
      - knowhere_test_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  postgres_test_data:
  redis_test_data:
  rabbitmq_test_data:
  minio_test_data:
  localstack_test_data:
  api_test_users_data:
  api_test_tmp_data:

networks:
  knowhere_test_network:
    driver: bridge

