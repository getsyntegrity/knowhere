#
# 根据新的部署方案：
# - dev 环境：使用 deploy/local-dev/docker-compose.dev.yml（本地开发）
# - test 环境（staging 分支）：使用 deploy/aliyun/docker-compose.ecs.yml（ECS/EC2 部署）
# - prod 环境（main 分支）：使用 Serverless 方案（ECS Fargate/ACK），不使用 Docker Compose
#
# 此文件保留仅作为参考，请勿用于生产环境部署。
# 生产环境部署请参考：
# - AWS: deploy/DEPLOYMENT_AWS.md
# - 阿里云: deploy/DEPLOYMENT_ALIYUN.md

version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    image: knowhere-backend:latest
    ports:
      - "5005:5005"
    environment:
      - ENVIRONMENT=production
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    env_file:
      - .env.production
    volumes:
      - ./apps/api:/app
      - ./packages/shared-python:/app/packages/shared-python
    networks:
      - knowhere-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.web
    image: knowhere-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - .env.production
    networks:
      - knowhere-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.worker
    image: knowhere-worker:latest
    environment:
      - ENVIRONMENT=production
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - HF_HOME=/mnt/models/huggingface
      - TRANSFORMERS_CACHE=/mnt/models/huggingface
    env_file:
      - .env.production
    volumes:
      - ./apps/worker:/app
      - ./packages/shared-python:/app/packages/shared-python
      - model-cache:/mnt/models/huggingface
    networks:
      - knowhere-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from shared.core.celery_app import celery_app; celery_app.control.inspect().stats()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  model-cache:
    driver: local

networks:
  knowhere-network:
    driver: bridge

