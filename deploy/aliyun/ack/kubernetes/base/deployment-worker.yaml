apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowhere-worker
  namespace: knowhere
  labels:
    app: knowhere-worker
    environment: ${ENVIRONMENT}
spec:
  replicas: ${WORKER_REPLICAS}
  selector:
    matchLabels:
      app: knowhere-worker
  template:
    metadata:
      labels:
        app: knowhere-worker
        environment: ${ENVIRONMENT}
    spec:
      containers:
      - name: worker
        image: ${REGISTRY}/knowhere-worker:${ENVIRONMENT}-latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: knowhere-config
        env:
        - name: HF_HOME
          value: /mnt/models/huggingface
        - name: TRANSFORMERS_CACHE
          value: /mnt/models/huggingface
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: database-url
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: redis-host
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: redis-password
        - name: RABBITMQ_HOST
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: rabbitmq-host
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: rabbitmq-password
        - name: S3_BUCKET_NAME
          value: ${OSS_BUCKET_NAME}
        - name: S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: oss-access-key-id
        - name: S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: oss-secret-access-key
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: secret-key
        volumeMounts:
        - name: model-cache
          mountPath: /mnt/models/huggingface
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 4000m
            memory: 8Gi
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "from shared.core.celery_app import celery_app; celery_app.control.inspect().stats()"
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - "from shared.core.celery_app import celery_app; celery_app.control.inspect().stats()"
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc

