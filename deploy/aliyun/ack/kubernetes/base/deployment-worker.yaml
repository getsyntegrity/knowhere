apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowhere-worker
  namespace: ${NAMESPACE}
  labels:
    app: knowhere-worker
    environment: ${ENVIRONMENT}
spec:
  replicas: ${WORKER_REPLICAS}
  selector:
    matchLabels:
      app: knowhere-worker
  template:
    metadata:
      labels:
        app: knowhere-worker
        environment: ${ENVIRONMENT}
    spec:
      ${IMAGE_PULL_SECRETS}
      affinity:
        podAntiAffinity:
          # 使用preferred优先分布在不同节点，但允许必要时在同一节点运行
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - knowhere-worker
              topologyKey: kubernetes.io/hostname
      containers:
      - name: worker
        image: ${REGISTRY}/knowhere-worker:${IMAGE_TAG}
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: knowhere-config
        env:
        - name: HF_HOME
          value: /mnt/models/huggingface
        - name: TRANSFORMERS_CACHE
          value: /mnt/models/huggingface
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: database-url
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: redis-host
        - name: REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: redis-port
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: redis-password
        - name: RABBITMQ_HOST
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: rabbitmq-host
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: rabbitmq-username
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: rabbitmq-password
        - name: CELERY_BROKER_URL
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: celery-broker-url
        - name: S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: s3-access-key-id
        - name: S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: s3-secret-access-key
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: secret-key
        - name: DS_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: ds-key
        - name: ALI_API_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: ali-api-key
        - name: ARK_API_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: ark-api-key
        - name: GPT_API_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: gpt-api-key
        - name: MINERU_API_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: mineru-api-key
        resources:
          requests:
            cpu: 700m
            memory: 2Gi
          limits:
            cpu: 1500m
            memory: 4Gi
        livenessProbe:
          exec:
            command:
            - python
            - -c
            - "from shared.services.worker_health import assert_worker_healthy; assert_worker_healthy()"
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          exec:
            command:
            - python
            - -c
            - "from shared.services.worker_health import assert_worker_healthy; assert_worker_healthy()"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
          successThreshold: 1
      # volumes:
      # - name: model-cache
      #   persistentVolumeClaim:
      #     claimName: model-cache-pvc
