apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowhere-web
  namespace: ${NAMESPACE}
  labels:
    app: knowhere-web
    environment: ${ENVIRONMENT}
spec:
  replicas: ${WEB_REPLICAS}
  selector:
    matchLabels:
      app: knowhere-web
  template:
    metadata:
      labels:
        app: knowhere-web
        environment: ${ENVIRONMENT}
    spec:
      ${IMAGE_PULL_SECRETS}
      affinity:
        podAntiAffinity:
          # 使用required确保每个节点最多一个web pod
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - knowhere-web
            topologyKey: kubernetes.io/hostname
      containers:
      - name: web
        image: ${REGISTRY}/knowhere-frontend:${IMAGE_TAG}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_API_URL
          value: ${API_URL}
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

