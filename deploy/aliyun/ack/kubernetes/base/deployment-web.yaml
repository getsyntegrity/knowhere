apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowhere-web
  namespace: ${NAMESPACE}
  labels:
    app: knowhere-web
    environment: ${ENVIRONMENT}
spec:
  replicas: ${WEB_REPLICAS}
  selector:
    matchLabels:
      app: knowhere-web
  template:
    metadata:
      labels:
        app: knowhere-web
        environment: ${ENVIRONMENT}
    spec:
      ${IMAGE_PULL_SECRETS}
      affinity:
        podAntiAffinity:
          # 使用preferred优先分布在不同节点，但允许必要时在同一节点运行
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - knowhere-web
              topologyKey: kubernetes.io/hostname
      containers:
      - name: web
        image: ${REGISTRY}/knowhere-frontend:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "${API_URL}"
        # 运行时配置（不带 NEXT_PUBLIC_ 前缀，支持动态配置）
        - name: COMPANY_NAME
          value: "${COMPANY_NAME}"
        - name: SIMPLE_COMPANY_NAME
          value: "${SIMPLE_COMPANY_NAME}"
        - name: ICP_NUMBER
          value: "${ICP_NUMBER}"
        - name: ICP_URL
          value: "${ICP_URL}"
        resources:
          requests:
            cpu: 150m
            memory: 512Mi
          limits:
            cpu: 400m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

