apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowhere-web
  namespace: knowhere
  labels:
    app: knowhere-web
    environment: ${ENVIRONMENT}
spec:
  replicas: ${WEB_REPLICAS}
  selector:
    matchLabels:
      app: knowhere-web
  template:
    metadata:
      labels:
        app: knowhere-web
        environment: ${ENVIRONMENT}
    spec:
      ${IMAGE_PULL_SECRETS}
      containers:
      - name: web
        image: ${REGISTRY}/knowhere-frontend:${ENVIRONMENT}-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - configMapRef:
            name: knowhere-config
        env:
        - name: NEXT_PUBLIC_API_URL
          value: ${API_URL}
        - name: NEXT_PUBLIC_POSTHOG_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: posthog-key
        - name: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: stripe-publishable-key
        - name: APP_VERSION
          value: ${APP_VERSION}
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

