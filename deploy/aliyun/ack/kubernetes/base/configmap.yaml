apiVersion: v1
kind: ConfigMap
metadata:
  name: knowhere-config
  namespace: ${NAMESPACE}
data:
  # 环境配置
  ENVIRONMENT: "${ENVIRONMENT}"
  DEBUG: "${DEBUG}"
  LOG_LEVEL: "${LOG_LEVEL}"
  
  # 应用元数据
  APP_TITLE: "${APP_TITLE}"
  APP_VERSION: "${APP_VERSION}"
  APP_DESCRIPTION: "${APP_DESCRIPTION}"
  
  # 文件路径配置
  TMP_PATH: "${TMP_PATH}"
  FONT_PATH: "${FONT_PATH}"
  CHROMEDRIVER_PATH: "${CHROMEDRIVER_PATH}"
  USERS_DATA_PATH: "${USERS_DATA_PATH}"
  
  # 安全配置
  ALGORITHM: "${ALGORITHM}"
  ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES}"
  
  # 数据库配置
  DB_SSL_MODE: "${DB_SSL_MODE}"
  
  # Redis配置
  REDIS_DATABASE: "${REDIS_DATABASE}"
  
  # RabbitMQ配置
  RABBITMQ_PORT: "${RABBITMQ_PORT}"
  RABBITMQ_VHOST: "${RABBITMQ_VHOST}"
  MESSAGE_BROKER_TYPE: "${MESSAGE_BROKER_TYPE}"
  CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND}"
  
  # 存储配置
  S3_TYPE: "${S3_TYPE}"
  S3_BUCKET_NAME: "${S3_BUCKET_NAME}"
  S3_TEMP_PATH: "${S3_TEMP_PATH}"
  OSS_ENDPOINT: "${OSS_ENDPOINT}"
  
  # 文件处理配置
  SUPPORTED_EXTENSIONS: "${SUPPORTED_EXTENSIONS}"
  MAX_FILE_SIZE: "${MAX_FILE_SIZE}"
  MAX_IMAGE_SIZE: "${MAX_IMAGE_SIZE}"
  
  # 模型参数配置
  MIN_CONFIDENCE_THRESHOLD: "${MIN_CONFIDENCE_THRESHOLD}"
  HIGH_IOU_THRESHOLD: "${HIGH_IOU_THRESHOLD}"
  DEFAULT_EMBEDDING_DIM: "${DEFAULT_EMBEDDING_DIM}"
  DEFAULT_TOP_K: "${DEFAULT_TOP_K}"
  DEFAULT_BATCH_SIZE: "${DEFAULT_BATCH_SIZE}"
  DEFAULT_EPOCHS: "${DEFAULT_EPOCHS}"
  DEFAULT_THRESHOLD: "${DEFAULT_THRESHOLD}"
  
  # 邮件配置
  SMTP_HOST: "${SMTP_HOST}"
  SMTP_PORT: "${SMTP_PORT}"
  SMTP_USER: "${SMTP_USER}"
  EMAILS_FROM_EMAIL: "${EMAILS_FROM_EMAIL}"
  EMAILS_FROM_NAME: "${EMAILS_FROM_NAME}"
  
  # AI模型配置
  DS_URL: "${DS_URL}"
  ALI_URL: "${ALI_URL}"
  ARK_URL: "${ARK_URL}"
  EMBEDDING_MODEL: "${EMBEDDING_MODEL}"
  NORMOL_MODEL: "${NORMAL_MODEL}"
  IMAGE_MODEL: "${IMAGE_MODEL}"
  IMAGE_MODEL_MAX: "${IMAGE_MODEL_MAX}"
  MINERU_URL: "${MINERU_URL}"
  
  # 认证和令牌配置
  USERS_VERIFY_TOKEN_SECRET: "${USERS_VERIFY_TOKEN_SECRET}"
  USERS_RESET_PASSWORD_TOKEN_SECRET: "${USERS_RESET_PASSWORD_TOKEN_SECRET}"
  
  # 支付配置
  STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
  STRIPE_PUBLISHABLE_KEY: "${STRIPE_PUBLISHABLE_KEY}"
  STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
  
  # OAuth配置（可选，如果配置了则启用对应的OAuth登录）
  # Google OAuth：如果配置了GOOGLE_CLIENT_ID和GOOGLE_CLIENT_SECRET，则启用Google登录
  # GitHub OAuth：如果配置了GITHUB_CLIENT_ID和GITHUB_CLIENT_SECRET，则启用GitHub登录
  # Apple OAuth：如果配置了APPLE_CLIENT_ID和APPLE_CLIENT_SECRET，则启用Apple登录
  # 阿里云环境通常不配置这些OAuth，如需启用只需配置对应的变量即可
  # GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
  # GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
  GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID}"
  GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET}"
  APPLE_CLIENT_ID: "${APPLE_CLIENT_ID}"
  APPLE_CLIENT_SECRET: "${APPLE_CLIENT_SECRET}"
  
  # 邮件配置
  SMTP_PASSWORD: "${SMTP_PASSWORD}"
  
  # 兼容性字段
  ALL_DF_COLS: "content,path,type,length,keywords,summary,know_id,tokens,connectto,addtime"
  DEFAULT_FOLDERS: "默认目录,Supplementary_Files,Temporary_Files,templates,images,fragments"
  KB_TERM: "KB_DATA"
  KB_VEC_TERM: "KB_VECS"
  META_PATH: "app/core/config/Meta_setting.csv"
  CONFIG_PATH: "app/core/config/config.txt"
  PATH_IMAGE_PATTERN: ".*\\.(png|jpe?g|gif)$"
  IMG_TBL_PATTERN: "TABLE_.*?_TABLE|IMAGE_.*?_IMAGE"
  SPLIT_CHAR: "-->"

