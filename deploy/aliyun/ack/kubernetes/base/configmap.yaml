apiVersion: v1
kind: ConfigMap
metadata:
  name: knowhere-config
  namespace: knowhere
data:
  # 环境配置
  ENVIRONMENT: "${ENVIRONMENT}"
  DEBUG: "${DEBUG:-false}"
  LOG_LEVEL: "${LOG_LEVEL:-INFO}"
  PYTHONUNBUFFERED: "1"
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  
  # 应用元数据
  APP_TITLE: "${APP_TITLE:-Konwhere AI知识库管理系统}"
  APP_VERSION: "${APP_VERSION}"
  APP_DESCRIPTION: "${APP_DESCRIPTION:-基于AI的知识库管理和智能问答系统}"
  
  # 文件路径配置
  TMP_PATH: "${TMP_PATH:-/tmp/aismart_bid}"
  FONT_PATH: "${FONT_PATH:-/usr/share/fonts}"
  CHROMEDRIVER_PATH: "${CHROMEDRIVER_PATH:-/usr/bin/chromedriver}"
  USERS_DATA_PATH: "${USERS_DATA_PATH:-/opt/knowhere/users}"
  
  # 安全配置
  ALGORITHM: "${ALGORITHM:-HS256}"
  ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}"
  
  # 数据库配置
  DB_SSL_MODE: "${DB_SSL_MODE:-prefer}"
  
  # Redis配置
  REDIS_DATABASE: "${REDIS_DATABASE:-0}"
  
  # RabbitMQ配置
  RABBITMQ_PORT: "${RABBITMQ_PORT:-5672}"
  RABBITMQ_VHOST: "${RABBITMQ_VHOST:-/}"
  MESSAGE_BROKER_TYPE: "${MESSAGE_BROKER_TYPE:-rabbitmq}"
  CELERY_RESULT_BACKEND: "${CELERY_RESULT_BACKEND:-rpc://}"
  
  # 存储配置
  S3_TYPE: "${S3_TYPE:-oss}"
  S3_BUCKET_NAME: "${S3_BUCKET_NAME}"
  S3_ENDPOINT_URL: "${S3_ENDPOINT_URL}"
  S3_PRIVATE_DOMAIN: "${S3_PRIVATE_DOMAIN}"
  S3_TEMP_PATH: "${S3_TEMP_PATH:-/tmp}"
  S3_REGION: "${S3_REGION}"
  S3_USE_SSL: "${S3_USE_SSL:-true}"
  S3_ADDRESSING_STYLE: "${S3_ADDRESSING_STYLE:-auto}"
  OSS_ENDPOINT: "${OSS_ENDPOINT}"
  SNS_SIGNATURE_VERIFICATION: "${SNS_SIGNATURE_VERIFICATION:-true}"
  OSS_EVENT_VERIFY_SIGNATURE: "${OSS_EVENT_VERIFY_SIGNATURE:-true}"
  
  # 文件处理配置
  SUPPORTED_EXTENSIONS: "${SUPPORTED_EXTENSIONS:-.doc,.docx,.pdf,.txt,.xls,.xlsx,.csv,.jpg,.png}"
  MAX_FILE_SIZE: "${MAX_FILE_SIZE:-104857600}"
  MAX_IMAGE_SIZE: "${MAX_IMAGE_SIZE:-10485760}"
  
  # 模型参数配置
  MIN_CONFIDENCE_THRESHOLD: "${MIN_CONFIDENCE_THRESHOLD:-0.05}"
  HIGH_IOU_THRESHOLD: "${HIGH_IOU_THRESHOLD:-0.9}"
  DEFAULT_EMBEDDING_DIM: "${DEFAULT_EMBEDDING_DIM:-1024}"
  DEFAULT_TOP_K: "${DEFAULT_TOP_K:-5}"
  DEFAULT_BATCH_SIZE: "${DEFAULT_BATCH_SIZE:-32}"
  DEFAULT_EPOCHS: "${DEFAULT_EPOCHS:-3}"
  DEFAULT_THRESHOLD: "${DEFAULT_THRESHOLD:-0.5}"
  
  # 订阅配置
  FREE_PLAN_INITIAL_CREDITS: "${FREE_PLAN_INITIAL_CREDITS:-100}"
  
  # 邮件配置
  SMTP_HOST: "${SMTP_HOST:-smtp.gmail.com}"
  SMTP_PORT: "${SMTP_PORT:-587}"
  SMTP_USER: "${SMTP_USER}"
  EMAILS_FROM_EMAIL: "${EMAILS_FROM_EMAIL}"
  EMAILS_FROM_NAME: "${EMAILS_FROM_NAME:-AI Smart Bid}"
  
  # AI模型配置
  DS_URL: "${DS_URL:-https://api.deepseek.com/v1/chat/completions}"
  ALI_URL: "${ALI_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}"
  ARK_URL: "${ARK_URL:-https://ark.cn-beijing.volces.com/api/v3/chat/completions}"
  EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-v1}"
  NORMOL_MODEL: "${NORMAL_MODEL:-gpt-3.5-turbo}"
  IMAGE_MODEL: "${IMAGE_MODEL:-gpt-4-vision-preview}"
  MINERU_URL: "${MINERU_URL:-https://mineru.net}"
  
  # 兼容性字段
  ALL_DF_COLS: "content,path,type,length,keywords,summary,know_id,tokens,extra,addtime"
  DEFAULT_FOLDERS: "Supplementary_Files,Temporary_Files,templates,images,fragments"
  KB_TERM: "KB_DATA"
  KB_VEC_TERM: "KB_VECS"
  META_PATH: "app/core/config/Meta_setting.csv"
  CONFIG_PATH: "app/core/config/config.txt"
  PATH_IMAGE_PATTERN: ".*\\.(png|jpe?g|gif)$"
  IMG_TBL_PATTERN: "TABLE_.*?_TABLE|IMAGE_.*?_IMAGE"
  SPLIT_CHAR: "-->"

