apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: knowhere-ingress
  namespace: ${NAMESPACE}
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - ${API_DOMAIN}
    - ${WEB_DOMAIN}
    secretName: knowhere-tls
  rules:
  - host: ${API_DOMAIN}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: knowhere-api
            port:
              number: 80
  - host: ${WEB_DOMAIN}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: knowhere-web
            port:
              number: 80

