# Kubernetes Secret资源模板
# 
# 注意：此文件仅作为模板，不包含实际敏感值
# 实际部署时，请使用以下方式创建Secret：
#
# 方式1：使用kubectl命令创建（推荐）
# kubectl create secret generic knowhere-secrets \
#   --from-literal=database-url='postgresql+asyncpg://user:password@host:5432/dbname' \
#   --from-literal=redis-host='redis-host' \
#   --from-literal=redis-port='6379' \
#   --from-literal=redis-password='' \
#   --from-literal=rabbitmq-host='rabbitmq-host' \
#   --from-literal=rabbitmq-username='admin' \
#   --from-literal=rabbitmq-password='password' \
#   --from-literal=oss-access-key-id='your-access-key-id' \
#   --from-literal=oss-secret-access-key='your-secret-access-key' \
#   --from-literal=secret-key='your-secret-key' \
#   --namespace=${NAMESPACE}
#
# 方式2：使用此YAML文件（需要先base64编码值）
# echo -n 'your-value' | base64
# 然后替换下面的 <base64-encoded-value>
#
# 方式3：使用阿里云Secrets Manager（推荐生产环境）
# 参考：https://help.aliyun.com/document_detail/152001.html

apiVersion: v1
kind: Secret
metadata:
  name: knowhere-secrets
  namespace: ${NAMESPACE}
type: Opaque
data:
  # 数据库连接URL
  # 格式: postgresql+asyncpg://username:password@host:port/database
  # 示例: echo -n 'postgresql+asyncpg://postgres:password@rds-endpoint:5432/knowhere' | base64
  database-url: <base64-encoded-database-url>
  
  # Redis配置
  # 示例: echo -n 'redis-endpoint' | base64
  redis-host: <base64-encoded-redis-host>
  # 示例: echo -n '6379' | base64
  redis-port: <base64-encoded-redis-port>
  # ElastiCache Serverless默认不需要密码，可以为空
  # 示例: echo -n '' | base64
  redis-password: <base64-encoded-redis-password>
  
  # RabbitMQ配置
  # 示例: echo -n 'rabbitmq-endpoint' | base64
  rabbitmq-host: <base64-encoded-rabbitmq-host>
  # 示例: echo -n 'admin' | base64
  rabbitmq-username: <base64-encoded-rabbitmq-username>
  # 示例: echo -n 'password' | base64
  rabbitmq-password: <base64-encoded-rabbitmq-password>
  
  # OSS/S3配置（阿里云对象存储）
  # 示例: echo -n 'your-access-key-id' | base64
  s3-access-key-id: <base64-encoded-s3-access-key-id>
  # 示例: echo -n 'your-secret-access-key' | base64
  s3-secret-access-key: <base64-encoded-s3-secret-access-key>
  
  # 应用密钥
  # 示例: echo -n 'your-jwt-secret-key' | base64
  secret-key: <base64-encoded-secret-key>
  
  # 用户验证密钥
  users-verify-token-secret: <base64-encoded-users-verify-token-secret>
  users-reset-password-token-secret: <base64-encoded-users-reset-password-token-secret>
  
  # Webhook配置
  webhook-signing-secret: <base64-encoded-webhook-signing-secret>
  s3-webhook-auth-token: <base64-encoded-s3-webhook-auth-token>
  oss-event-callback-key: <base64-encoded-oss-event-callback-key>
  
  # Stripe配置（如果使用）
  stripe-secret-key: <base64-encoded-stripe-secret-key>
  stripe-publishable-key: <base64-encoded-stripe-publishable-key>
  stripe-webhook-secret: <base64-encoded-stripe-webhook-secret>
  
  # PostHog配置（如果使用）
  posthog-key: <base64-encoded-posthog-key>
  
  # Resend邮件配置
  resend-api-key: <base64-encoded-resend-api-key>
  
  # Moesif配置
  moesif-application-id: <base64-encoded-moesif-application-id>
  
  # OAuth配置
  google-client-id: <base64-encoded-google-client-id>
  google-client-secret: <base64-encoded-google-client-secret>
  github-client-id: <base64-encoded-github-client-id>
  github-client-secret: <base64-encoded-github-client-secret>
  apple-client-id: <base64-encoded-apple-client-id>
  apple-client-secret: <base64-encoded-apple-client-secret>
  
  # SMTP配置
  smtp-password: <base64-encoded-smtp-password>
  
  # AI模型配置
  ds-key: <base64-encoded-ds-key>
  ali-api-key: <base64-encoded-ali-api-key>
  ark-api-key: <base64-encoded-ark-api-key>
  gpt-api-key: <base64-encoded-gpt-api-key>
  mineru-api-key: <base64-encoded-mineru-api-key>
  
  # Celery配置
  celery-broker-url: <base64-encoded-celery-broker-url>

---
# 创建Secret的辅助脚本示例（不要提交到版本控制）
# 保存为 create-secrets.sh，填入实际值后运行
