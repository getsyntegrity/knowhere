apiVersion: v1
kind: Service
metadata:
  name: knowhere-api
  namespace: ${NAMESPACE}
  labels:
    app: knowhere-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5005
    protocol: TCP
    name: http
  selector:
    app: knowhere-api
---
apiVersion: v1
kind: Service
metadata:
  name: knowhere-web
  namespace: ${NAMESPACE}
  labels:
    app: knowhere-web
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: knowhere-web
---
apiVersion: v1
kind: Service
metadata:
  name: knowhere-worker
  namespace: ${NAMESPACE}
  labels:
    app: knowhere-worker
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: knowhere-worker

