apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowhere-api
  namespace: knowhere
  labels:
    app: knowhere-api
    environment: ${ENVIRONMENT}
spec:
  replicas: ${API_REPLICAS}
  selector:
    matchLabels:
      app: knowhere-api
  template:
    metadata:
      labels:
        app: knowhere-api
        environment: ${ENVIRONMENT}
    spec:
      ${IMAGE_PULL_SECRETS}
      containers:
      - name: api
        image: ${REGISTRY}/knowhere-backend:${IMAGE_TAG}
        imagePullPolicy: Always
        ports:
        - containerPort: 5005
          name: http
        envFrom:
        - configMapRef:
            name: knowhere-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: database-url
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: redis-host
        - name: REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: redis-port
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: redis-password
        - name: RABBITMQ_HOST
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: rabbitmq-host
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: rabbitmq-username
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: rabbitmq-password
        - name: CELERY_BROKER_URL
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: celery-broker-url
        - name: S3_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: s3-access-key-id
        - name: S3_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: s3-secret-access-key
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: secret-key
        - name: DS_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: ds-key
        - name: ALI_API_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: ali-api-key
        - name: ARK_API_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: ark-api-key
        - name: GPT_API_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: gpt-api-key
        - name: MINERU_API_KEY
          valueFrom:
            secretKeyRef:
              name: knowhere-secrets
              key: mineru-api-key
        volumeMounts:
        - name: db-ssl-cert
          mountPath: /etc/db-ssl
          readOnly: true
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5005
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: db-ssl-cert
        secret:
          secretName: db-ssl-cert

