version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: knowhere-postgres
    environment:
      POSTGRES_DB: Knowhere
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-root123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - /var/lib/knowhere/data/postgres:/var/lib/postgresql/data
    networks:
      - knowhere-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d Knowhere"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: knowhere-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru --stop-writes-on-bgsave-error no
    volumes:
      - /var/lib/knowhere/data/redis:/data
    networks:
      - knowhere-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: knowhere-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - /var/lib/knowhere/data/rabbitmq:/var/lib/rabbitmq
    networks:
      - knowhere-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # API 服务
  api:
    image: knowhere-registry.cn-shenzhen.cr.aliyuncs.com/knowhere/knowhere-backend:staging-latest
    container_name: knowhere-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - /var/lib/knowhere/.env
    environment:
      - ENVIRONMENT=staging
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - FRONTEND_URL=${FRONTEND_URL:-https://test.knowhereto.com}
    volumes:
      - /var/lib/knowhere/logs:/app/logs
      - /var/lib/knowhere/users:/app/users
    networks:
      - knowhere-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Web 前端服务
  web:
    image: knowhere-registry.cn-shenzhen.cr.aliyuncs.com/knowhere/knowhere-frontend:staging-latest
    container_name: knowhere-web
    depends_on:
      - api
    env_file:
      - /var/lib/knowhere/.env
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      # API URL（构建时配置，需要 NEXT_PUBLIC_ 前缀）
      # 如果 .env 文件中有 API_URL，会通过 env_file 读取，这里提供默认值
      - NEXT_PUBLIC_API_URL=${API_URL:-https://apitest.knowhereto.com}
      # 运行时配置（不带 NEXT_PUBLIC_ 前缀，通过服务端组件直接读取环境变量）
      # 这些变量会从 .env 文件通过 env_file 读取，如果 .env 中没有则使用默认值
      # 注意：environment 中的变量会覆盖 env_file 中的同名变量
      # 服务端组件会在 SSR 时读取这些环境变量，通过 React Context 传递给客户端组件
      - COMPANY_NAME=${COMPANY_NAME:-深圳市渊维科技有限公司}
      - SIMPLE_COMPANY_NAME=${SIMPLE_COMPANY_NAME:-}
      - ICP_NUMBER=${ICP_NUMBER:-}
      - ICP_URL=${ICP_URL:-https://beian.miit.gov.cn/}
    networks:
      - knowhere-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Worker 服务
  worker:
    image: knowhere-registry.cn-shenzhen.cr.aliyuncs.com/knowhere/knowhere-worker:staging-latest
    container_name: knowhere-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file:
      - /var/lib/knowhere/.env
    environment:
      - ENVIRONMENT=staging
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - /var/lib/knowhere/logs:/app/logs
      - /var/lib/knowhere/users:/app/users
    networks:
      - knowhere-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "from shared.core.celery_app import celery_app; celery_app.control.inspect().stats()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: knowhere-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - web
    volumes:
      - /var/lib/knowhere/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - knowhere-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--no-check-certificate", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  knowhere-network:
    driver: bridge

