[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "knowhere-shared"
version = "0.1.0"
description = "Knowhere Shared Python Package - Core Infrastructure: Models, Config, Database, Redis Services, Storage Adapters, and Utils"
requires-python = ">=3.11,<3.14"
dependencies = [
    # Database
    "sqlalchemy==2.0.42",
    "sqlalchemy[asyncio]",
    "asyncpg==0.29.0",
    "psycopg2-binary==2.9.9",
    "alembic==1.13.1",
    "sqlalchemy-utils==0.41.1",
    "pgvector==0.2.4",
    
    # Redis
    "redis==5.3.1",
    
    # Celery task queue
    "celery==5.4.0",
    "kombu==5.4.0",
    "billiard==4.2.0",
    "vine==5.1.0",
    "celery-redbeat==2.2.0",

    # Data validation
    "pydantic==2.11.7",
    "pydantic-settings==2.10.1",
    "python-dotenv==1.2.2",
    "pydantic[email]==2.11.7",
    
    # Auth and user model support
    "fastapi-users[sqlalchemy]==15.0.5",
    "authlib==1.6.11",
    "email-validator==2.2.0",
    
    # HTTP clients
    "httpx==0.28.1",
    "requests==2.33.0",
    "aiohttp==3.13.4",
    "qstash==3.2.0",

    # OpenAI SDK
    "openai>=1.0.0",
    
    # Cloud storage
    "boto3==1.38.46",
    "botocore==1.38.46",
    
    # Logging
    "loguru==0.7.3",
    "psutil==5.9.8",
    
    # Utilities
    "pytz==2025.2",
    "PyYAML==6.0.2",
    "typing-extensions==4.14.1",
    "jieba==0.42.1",
    "rank-bm25>=0.2.2",

    # Text processing
    "blingfire>=0.1.8",
    "syntok>=1.4.4",

    # Image processing (used by ZipResultService)
    "pillow==12.2.0",

    # Gevent coroutine pool support
    "gevent>=24.11.1",
    "psycogreen>=1.0.2",

    # Test support
    "pytest==9.0.3",
    "pytest-asyncio==1.3.0",
    "pytest-mock==3.15.1",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["shared*"]

[tool.black]
line-length = 88
target-version = ['py311']

[tool.isort]
profile = "black"
line_length = 88
