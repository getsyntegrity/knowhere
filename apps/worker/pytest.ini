[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore:datetime.datetime.utcnow\(\) is deprecated and scheduled for removal in a future version\..*:DeprecationWarning:openpyxl\.packaging\.core
