version: '3.8'

services:
  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: knowhere_rabbitmq
    ports:
      - "5672:5672"    # AMQP端口
      - "15672:15672"  # 管理界面端口
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - knowhere_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: knowhere_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - knowhere_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: knowhere_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: Knowhere
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root123
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - knowhere_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d Knowhere"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO 对象存储 - 使用宿主机网络模式
  minio:
    image: minio/minio:latest
    container_name: knowhere_minio
    network_mode: host  # 使用宿主机网络
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      # MinIO webhook配置 - 直接访问localhost
      MINIO_NOTIFY_WEBHOOK_ENABLE_1: "on"
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_1: "http://localhost:8000/v1/internal/s3-events"
      MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_1: "dev-webhook-token"
      MINIO_NOTIFY_WEBHOOK_QUEUE_LIMIT_1: "100"
    volumes:
      - minio_data:/data
      - ./minio/init:/docker-entrypoint-initdb.d
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  rabbitmq_data:
  redis_data:
  postgres_data:
  minio_data:

networks:
  knowhere_network:
    driver: bridge
