version: '3.8'

services:
  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: knowhere_rabbitmq
    ports:
      - "5672:5672"    # AMQP端口
      - "15672:15672"  # 管理界面端口
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - knowhere_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: knowhere_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - knowhere_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: knowhere_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: Knowhere
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root123
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - knowhere_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d Knowhere"]
      interval: 30s
      timeout: 10s
      retries: 5

  # LocalStack AWS服务模拟 - 使用宿主机网络模式
  localstack:
    image: localstack/localstack:3.8
    container_name: knowhere_localstack
    network_mode: host  # 使用宿主机网络
    environment:
      # LocalStack基础配置
      SERVICES: s3,sns,sqs,lambda,iam,sts
      DEBUG: 1
      PERSISTENCE: 1
      DATA_DIR: /var/lib/localstack/data
      # S3配置
      S3_SKIP_SIGNATURE_VALIDATION: 1
      S3_SKIP_SSL_VERIFICATION: 1
      # 网络配置
      HOSTNAME_EXTERNAL: localhost
      # 端口配置
      EDGE_PORT: 4566
      # 事件通知配置
      SNS_ENDPOINT_STRATEGY: domain
      # 开发模式
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./localstack/init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  rabbitmq_data:
  redis_data:
  postgres_data:
  localstack_data:

networks:
  knowhere_network:
    driver: bridge
